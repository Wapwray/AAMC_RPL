<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AAMC RPL Quiz - V2</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f3f7fb;
        color: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .loadingCard {
        width: min(520px, 100%);
        background: #ffffff;
        border: 1px solid #d8e3ee;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
      }

      .loadingTitle {
        margin: 0 0 10px;
        font-size: 20px;
        font-weight: 700;
      }

      .loadingBody {
        margin: 0;
        font-size: 14px;
        line-height: 1.5;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="loadingCard">
      <h1 class="loadingTitle">Loading AAMC RPL 2026 V2</h1>
      <p class="loadingBody" id="loadingMessage">Opening assessment...</p>
    </div>

    <script>
      const SOURCE_HTML_URL = "./AAMC%20RPL%202026.html";
      const loadingMessageEl = document.getElementById("loadingMessage");

      const setLoadingMessage = (message) => {
        if (loadingMessageEl) {
          loadingMessageEl.textContent = message;
        }
      };

      const buildPatchedHtml = (sourceHtml) => {
        let patched = sourceHtml;

        patched = patched.replace(
          '<button id="welcomeResetBtn" class="secondary" type="button">RESET</button>',
          ''
        );

        patched = patched.replace(
          '<button id="showHintBtn" class="hintBtn secondary">Show Hint</button>',
          [
            '<button id="showHintBtn" class="hintBtn secondary">Show Hint</button>',
            '<div id="questionJumpControls" style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">',
            '  <select id="questionJumpSelect" style="width:auto; min-width:160px;">',
            '    <option value="">Jump to question</option>',
            '    <option value="1">1</option>',
            '    <option value="2">2</option>',
            '    <option value="3">3</option>',
            '    <option value="4">4</option>',
            '    <option value="5">5</option>',
            '    <option value="6">6</option>',
            '    <option value="7">7</option>',
            '    <option value="8">8</option>',
            '    <option value="9">9</option>',
            '    <option value="10">10</option>',
            '    <option value="11">11</option>',
            '    <option value="12">12</option>',
            '  </select>',
            '  <button id="questionJumpSubmitBtn" class="secondary" type="button" onclick="window.__rplJumpToSelectedQuestion && window.__rplJumpToSelectedQuestion()">Submit</button>',
            '  <button id="questionClearBtn" class="secondary" type="button" onclick="window.__rplClearCurrentQuestion && window.__rplClearCurrentQuestion()">Question Clear</button>',
            '  <button id="questionDownloadBtn" class="secondary" type="button" onclick="window.__rplDownloadCurrentQuestion && window.__rplDownloadCurrentQuestion()">DOWNLOAD</button>',
            '</div>',
          ].join("\n")
        );

        patched = patched.replace(
          '      const showHintBtn = document.getElementById("showHintBtn");',
          [
            '      const showHintBtn = document.getElementById("showHintBtn");',
            '      const questionJumpSelectEl = document.getElementById("questionJumpSelect");',
            '      const questionJumpSubmitBtn = document.getElementById("questionJumpSubmitBtn");',
            '      const questionClearBtn = document.getElementById("questionClearBtn");',
            '      const questionDownloadBtn = document.getElementById("questionDownloadBtn");',
          ].join("\n")
        );

        patched = patched.replace(
          '      const renderQuestion = () => {',
          [
            '      const getHeaderQuestionMeta = () => {',
            '        const currentFromDataset = Number.parseInt(headerTitleEl?.dataset?.questionNumber || "", 10);',
            '        const totalFromDataset = Number.parseInt(headerTitleEl?.dataset?.questionTotal || "", 10);',
            '        if (Number.isFinite(currentFromDataset) && currentFromDataset > 0 && Number.isFinite(totalFromDataset) && totalFromDataset > 0) {',
            '          return { current: currentFromDataset, total: totalFromDataset };',
            '        }',
            '        const headerText = (headerTitleEl?.textContent || "").trim();',
            '        const match = headerText.match(/Question\\s+(\\d+)\\s+of\\s+(\\d+)/i);',
            '        if (!match) {',
            '          return { current: (currentIndex || 0) + 1, total: 0 };',
            '        }',
            '        const current = Number.parseInt(match[1], 10);',
            '        const total = Number.parseInt(match[2], 10);',
            '        return {',
            '          current: Number.isFinite(current) && current > 0 ? current : (currentIndex || 0) + 1,',
            '          total: Number.isFinite(total) && total > 0 ? total : 0,',
            '        };',
            '      };',
            '',
            '      const getTotalQuestionCount = () => {',
            '        const listCount = Array.isArray(questions) ? questions.length : 0;',
            '        if (listCount > 0) return listCount;',
            '        const headerMeta = getHeaderQuestionMeta();',
            '        if (headerMeta.total > 0) return headerMeta.total;',
            '        return 12;',
            '      };',
            '',
            '      const syncQuestionJumpControl = () => {',
            '        if (!questionJumpSelectEl) return;',
            '        const headerMeta = getHeaderQuestionMeta();',
            '        const total = getTotalQuestionCount();',
            '        const currentValue = String(headerMeta.current > 0 ? headerMeta.current : (currentIndex || 0) + 1);',
            '        questionJumpSelectEl.innerHTML = "";',
            '        const placeholder = document.createElement("option");',
            '        placeholder.value = "";',
            '        placeholder.textContent = "Jump to question";',
            '        questionJumpSelectEl.appendChild(placeholder);',
            '        for (let i = 1; i <= total; i += 1) {',
            '          const option = document.createElement("option");',
            '          option.value = String(i);',
            '          option.textContent = String(i);',
            '          questionJumpSelectEl.appendChild(option);',
            '        }',
            '        questionJumpSelectEl.value = currentValue;',
            '        questionJumpSelectEl.disabled = total < 1;',
            '        if (questionJumpSubmitBtn) questionJumpSubmitBtn.disabled = total < 1;',
            '        if (questionClearBtn) questionClearBtn.disabled = total < 1;',
            '        if (questionDownloadBtn) questionDownloadBtn.disabled = total < 1;',
            '        window.__rplJumpToSelectedQuestion = jumpToSelectedQuestion;',
            '        window.__rplClearCurrentQuestion = clearCurrentQuestion;',
            '      };',
            '',
            '      const jumpToSelectedQuestion = () => {',
            '        if (!questionJumpSelectEl) return;',
            '        const selected = Number.parseInt(questionJumpSelectEl.value || "", 10);',
            '        if (!Number.isFinite(selected)) return;',
            '        const targetIndex = selected - 1;',
            '        const total = getTotalQuestionCount();',
            '        if (targetIndex < 0 || targetIndex >= total) return;',
            '        if (Array.isArray(questions) && questions.length > 0) {',
            '          currentIndex = Math.max(0, Math.min(questions.length - 1, targetIndex));',
            '        } else {',
            '          currentIndex = targetIndex;',
            '        }',
            '        renderQuestion();',
            '        setStatus("Jumped to Question " + selected + ".");',
            '      };',
            '',
            '      const clearCurrentQuestion = () => {',
            '        if (!Array.isArray(questions) || !questions.length) return;',
            '        if (typeof stopDictation === "function" && isDictating) {',
            '          stopDictation();',
            '        }',
            '        if (Array.isArray(transcriptQuestions) && currentIndex >= 0) {',
            '          delete transcriptQuestions[currentIndex];',
            '        }',
            '        renderQuestion();',
            '        setStatus("Current question cleared and reset to Attempt 1.");',
            '      };',
            '',
            '      const renderQuestion = () => {',
          ].join("\n")
        );

        patched = patched.replace(
          '        headerTitleEl.textContent = `Compliance - Question ${number} of ${total} - Attempt 1`;',
          [
            '        headerTitleEl.textContent = `Compliance - Question ${number} of ${total} - Attempt 1`;',
            '        if (headerTitleEl) {',
            '          headerTitleEl.dataset.questionNumber = String(number);',
            '          headerTitleEl.dataset.questionTotal = String(total);',
            '        }',
          ].join("\n")
        );

        patched = patched.replace(
          [
            '        if (showHintBtn) showHintBtn.disabled = false;',
            '        updateEvaluateButtonState();',
            '      };',
          ].join("\n"),
          [
            '        if (showHintBtn) showHintBtn.disabled = false;',
            '        updateEvaluateButtonState();',
            '        syncQuestionJumpControl();',
            '        if (typeof requestAnimationFrame === "function") {',
            '          requestAnimationFrame(() => syncQuestionJumpControl());',
            '        }',
            '      };',
          ].join("\n")
        );

        patched = patched.replace(
          [
            '      hintOverlayEl?.addEventListener("click", (event) => {',
            '        if (event.target === hintOverlayEl) {',
            '          closeHint();',
            '        }',
            '      });',
          ].join("\n"),
          [
            '      hintOverlayEl?.addEventListener("click", (event) => {',
            '        if (event.target === hintOverlayEl) {',
            '          closeHint();',
            '        }',
            '      });',
            '',
            '      questionJumpSubmitBtn?.addEventListener("click", () => {',
            '        jumpToSelectedQuestion();',
            '      });',
            '      questionClearBtn?.addEventListener("click", () => {',
            '        clearCurrentQuestion();',
            '      });',
          ].join("\n")
        );

        patched = patched.replace(
          '</body>',
          [
            '<script>',
            '(function () {',
            '  const installQuestionJumpPatch = () => {',
            '    const headerTitleEl = document.getElementById("headerTitle");',
            '    const questionJumpSelectEl = document.getElementById("questionJumpSelect");',
            '    const questionJumpSubmitBtn = document.getElementById("questionJumpSubmitBtn");',
            '    const questionClearBtn = document.getElementById("questionClearBtn");',
            '    const questionDownloadBtn = document.getElementById("questionDownloadBtn");',
            '    if (!headerTitleEl || !questionJumpSelectEl || !questionJumpSubmitBtn || !questionClearBtn || !questionDownloadBtn) {',
            '      window.setTimeout(installQuestionJumpPatch, 200);',
            '      return;',
            '    }',
            '',
            '    const getHeaderMeta = () => {',
            '      const headerText = (headerTitleEl.textContent || "").trim();',
            '      const match = headerText.match(/Question\\s+(\\d+)\\s+of\\s+(\\d+)/i);',
            '      if (!match) {',
            '        return { current: 1, total: 12 };',
            '      }',
            '      const current = Number.parseInt(match[1], 10);',
            '      const total = Number.parseInt(match[2], 10);',
            '      return {',
            '        current: Number.isFinite(current) && current > 0 ? current : 1,',
            '        total: Number.isFinite(total) && total > 0 ? total : 12,',
            '      };',
            '    };',
            '',
            '    const syncQuestionJumpControl = () => {',
            '      const meta = getHeaderMeta();',
            '      questionJumpSelectEl.innerHTML = "";',
            '      const placeholder = document.createElement("option");',
            '      placeholder.value = "";',
            '      placeholder.textContent = "Jump to question";',
            '      questionJumpSelectEl.appendChild(placeholder);',
            '      for (let i = 1; i <= meta.total; i += 1) {',
            '        const option = document.createElement("option");',
            '        option.value = String(i);',
            '        option.textContent = String(i);',
            '        questionJumpSelectEl.appendChild(option);',
            '      }',
            '      questionJumpSelectEl.value = String(meta.current);',
            '      questionDownloadBtn.disabled = meta.total < 1;',
            '    };',
            '',
            '    const buildFileStamp = (value) => {',
            '      const pad = (part) => String(part).padStart(2, "0");',
            '      return [',
            '        value.getFullYear(),',
            '        pad(value.getMonth() + 1),',
            '        pad(value.getDate()),',
            '      ].join("-") + " " + [pad(value.getHours()), pad(value.getMinutes()), pad(value.getSeconds())].join("-");',
            '    };',
            '',
            '    const buildCurrentQuestionDownloadText = () => {',
            '      const now = new Date();',
            '      const headerMeta = getHeaderMeta();',
            '      const questionNumber = typeof currentIndex === "number" && currentIndex >= 0 ? currentIndex + 1 : headerMeta.current;',
            '      const question = Array.isArray(questions) && questions[questionNumber - 1] ? questions[questionNumber - 1] : {};',
            '      const questionText = (question["Question Details"] || question.field_2 || question.field_5 || question.Title || document.getElementById("questionText")?.textContent || "").trim();',
            '      const objectiveText = (question.Objective || question.field_4 || question.field_3 || "").trim();',
            '      const hintText = typeof getQuestionHint === "function" ? String(getQuestionHint(question) || "").trim() : "";',
            '      const ctx = typeof getStudentContext === "function" ? getStudentContext() : { fullName: "", givenName: "Student", contactId: "" };',
            '      const entry = Array.isArray(transcriptQuestions) ? transcriptQuestions[questionNumber - 1] : null;',
            '      const historyEl = document.getElementById("chatHistory");',
            '      const visibleEntries = historyEl ? Array.from(historyEl.querySelectorAll(".chatEntry")) : [];',
            '      const draftAnswer = typeof answerInputEl !== "undefined" && answerInputEl?.value ? answerInputEl.value.trim() : "";',
            '      const lines = [];',
            '      lines.push("Question " + questionNumber + " Transcript");',
            '      lines.push("Generated: " + (typeof formatDateTime === "function" ? formatDateTime(now) : now.toLocaleString()));',
            '      lines.push("Name: " + (ctx.fullName || "N/A"));',
            '      lines.push("Contact ID: " + (ctx.contactId || "N/A"));',
            '      lines.push("Header: " + (headerTitleEl.textContent || ""));',
            '      lines.push("");',
            '      lines.push("Question Details");',
            '      lines.push("-----------------------------");',
            '      lines.push(questionText || "No question text available.");',
            '      if (objectiveText) {',
            '        lines.push("");',
            '        lines.push("Objective:");',
            '        lines.push(objectiveText);',
            '      }',
            '      if (hintText) {',
            '        lines.push("");',
            '        lines.push("Hint:");',
            '        lines.push(hintText);',
            '      }',
            '      lines.push("");',
            '      lines.push("Conversation");',
            '      lines.push("-----------------------------");',
            '      if (entry && Array.isArray(entry.attempts) && entry.attempts.length) {',
            '        entry.attempts.forEach((attempt, index) => {',
            '          lines.push((ctx.givenName || ctx.fullName || "Student") + " (Attempt " + (index + 1) + "):");',
            '          lines.push((attempt.answer || "").trim() || "[No answer recorded]");',
            '          lines.push("");',
            '          if (attempt.feedback) {',
            '            lines.push("System:");',
            '            lines.push(String(attempt.feedback).trim());',
            '            lines.push("");',
            '          }',
            '          if (attempt.submittedAt) {',
            '            const submitted = typeof formatDateTime === "function" ? formatDateTime(attempt.submittedAt) : String(attempt.submittedAt);',
            '            lines.push("Submitted: " + submitted);',
            '            lines.push("");',
            '          }',
            '        });',
            '      } else if (visibleEntries.length) {',
            '        visibleEntries.forEach((node) => {',
            '          const role = node.classList.contains("user") ? (ctx.givenName || ctx.fullName || "Student") : "System";',
            '          lines.push(role + ":");',
            '          lines.push((node.textContent || "").trim());',
            '          lines.push("");',
            '        });',
            '      } else {',
            '        lines.push("No saved conversation for this question yet.");',
            '        lines.push("");',
            '      }',
            '      if (draftAnswer) {',
            '        lines.push("Current Draft Answer:");',
            '        lines.push(draftAnswer);',
            '      }',
            '      return {',
            '        fileName: "Question " + questionNumber + " - " + buildFileStamp(now) + ".txt",',
            '        contents: lines.join(String.fromCharCode(10)),',
            '      };',
            '    };',
            '',
            '    const saveDownloadText = async (fileName, contents) => {',
            '      const blob = new Blob([contents], { type: "text/plain;charset=utf-8" });',
            '      if (typeof window.showSaveFilePicker === "function") {',
            '        const handle = await window.showSaveFilePicker({',
            '          suggestedName: fileName,',
            '          types: [{ description: "Text Files", accept: { "text/plain": [".txt"] } }],',
            '        });',
            '        const writable = await handle.createWritable();',
            '        await writable.write(blob);',
            '        await writable.close();',
            '        return true;',
            '      }',
            '      const url = URL.createObjectURL(blob);',
            '      const link = document.createElement("a");',
            '      link.href = url;',
            '      link.download = fileName;',
            '      document.body.appendChild(link);',
            '      link.click();',
            '      link.remove();',
            '      window.setTimeout(() => URL.revokeObjectURL(url), 1000);',
            '      return false;',
            '    };',
            '',
            '    const downloadCurrentQuestion = async () => {',
            '      try {',
            '        const payload = buildCurrentQuestionDownloadText();',
            '        const usedSavePicker = await saveDownloadText(payload.fileName, payload.contents);',
            '        if (typeof setStatus === "function") {',
            '          setStatus(usedSavePicker ? "Question transcript saved." : "Question transcript download started.");',
            '        }',
            '      } catch (error) {',
            '        if (error && error.name === "AbortError") {',
            '          if (typeof setStatus === "function") setStatus("Download cancelled.");',
            '          return;',
            '        }',
            '        if (typeof setStatus === "function") {',
            '          setStatus(error && error.message ? error.message : String(error));',
            '        }',
            '      }',
            '    };',
            '',
            '    const renderQuestionFallback = () => {',
            '      const total = Array.isArray(questions) && questions.length ? questions.length : getHeaderMeta().total;',
            '      const question = Array.isArray(questions) && questions[currentIndex] ? questions[currentIndex] : {};',
            '      const questionTextEl = document.getElementById("questionText");',
            '      const answerInputEl = document.getElementById("answerInput");',
            '      const chatHistoryEl = document.getElementById("chatHistory");',
            '      headerTitleEl.textContent = "Compliance - Question " + (currentIndex + 1) + " of " + total + " - Attempt 1";',
            '      headerTitleEl.dataset.questionNumber = String(currentIndex + 1);',
            '      headerTitleEl.dataset.questionTotal = String(total);',
            '      if (questionTextEl) questionTextEl.textContent = (question["Question Details"] || question.field_2 || question.field_5 || question.Title || "").trim();',
            '      if (answerInputEl) answerInputEl.value = "";',
            '      if (chatHistoryEl) chatHistoryEl.textContent = "";',
            '      if (typeof currentAttempts !== "undefined") currentAttempts = 0;',
            '      if (typeof currentResponses !== "undefined") currentResponses = [];',
            '      if (typeof updateEvaluateButtonState === "function") updateEvaluateButtonState();',
            '    };',
            '',
            '    const jumpToSelectedQuestion = () => {',
            '      const selected = Number.parseInt(questionJumpSelectEl.value || "", 10);',
            '      if (!Number.isFinite(selected) || selected < 1) {',
            '        return;',
            '      }',
            '      try {',
            '        currentIndex = selected - 1;',
            '      } catch (error) {',
            '        return;',
            '      }',
            '      try {',
            '        if (typeof renderQuestion === "function") {',
            '          renderQuestion();',
            '        } else {',
            '          renderQuestionFallback();',
            '        }',
            '      } catch (error) {',
            '        renderQuestionFallback();',
            '      }',
            '      if (typeof setStatus === "function") {',
            '        setStatus("Jumped to Question " + selected + ".");',
            '      }',
            '      syncQuestionJumpControl();',
            '    };',
            '',
            '    const clearCurrentQuestion = () => {',
            '      if (typeof stopDictation === "function" && typeof isDictating !== "undefined" && isDictating) {',
            '        stopDictation();',
            '      }',
            '      if (Array.isArray(transcriptQuestions) && typeof currentIndex === "number" && currentIndex >= 0) {',
            '        delete transcriptQuestions[currentIndex];',
            '      }',
            '      try {',
            '        if (typeof renderQuestion === "function") {',
            '          renderQuestion();',
            '        } else {',
            '          renderQuestionFallback();',
            '        }',
            '      } catch (error) {',
            '        renderQuestionFallback();',
            '      }',
            '      if (typeof setStatus === "function") {',
            '        setStatus("Current question cleared and reset to Attempt 1.");',
            '      }',
            '      syncQuestionJumpControl();',
            '    };',
            '',
            '    window.__rplJumpToSelectedQuestion = jumpToSelectedQuestion;',
            '    window.__rplClearCurrentQuestion = clearCurrentQuestion;',
            '    window.__rplDownloadCurrentQuestion = downloadCurrentQuestion;',
            '    questionJumpSubmitBtn.onclick = jumpToSelectedQuestion;',
            '    questionClearBtn.onclick = clearCurrentQuestion;',
            '    questionDownloadBtn.onclick = downloadCurrentQuestion;',
            '    if (!window.__rplQuestionJumpHeaderObserver) {',
            '      window.__rplQuestionJumpHeaderObserver = new MutationObserver(() => {',
            '        syncQuestionJumpControl();',
            '      });',
            '      window.__rplQuestionJumpHeaderObserver.observe(headerTitleEl, { childList: true, characterData: true, subtree: true });',
            '    }',
            '',
            '    syncQuestionJumpControl();',
            '  };',
            '',
            '  if (document.readyState === "loading") {',
            '    document.addEventListener("DOMContentLoaded", installQuestionJumpPatch, { once: true });',
            '  } else {',
            '    installQuestionJumpPatch();',
            '  }',
            '  window.addEventListener("load", installQuestionJumpPatch, { once: true });',
            '})();',
            '<\/script>',
            '</body>',
          ].join("\n")
        );

        return patched;
      };

      const bootstrap = async () => {
        setLoadingMessage("Loading assessment page.");
        const response = await fetch(SOURCE_HTML_URL, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Unable to load source file: ${response.status} ${response.statusText}`);
        }

        const sourceHtml = await response.text();
        const patchedHtml = buildPatchedHtml(sourceHtml);
        setLoadingMessage("Starting assessment.");
        document.open();
        document.write(patchedHtml);
        document.close();
      };

      bootstrap().catch((error) => {
        console.error(error);
        setLoadingMessage(error?.message || String(error));
      });
    </script>
  </body>
</html>
