<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RPL Report Generator V1.0</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6f8;
        --panel: #ffffff;
        --ink: #172033;
        --muted: #64748b;
        --line: #cbd5e1;
        --accent: #1d4ed8;
        --accent-dark: #1e40af;
        --danger: #b91c1c;
        --ok: #166534;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
        line-height: 1.45;
      }

      main {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 32px;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      h1, h2 {
        margin: 0;
        line-height: 1.2;
        color: #0f172a;
      }

      h1 { font-size: 28px; }
      h2 { font-size: 18px; margin-bottom: 12px; }

      .grid {
        display: grid;
        grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
        gap: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      label {
        display: block;
        margin: 12px 0 6px;
        font-size: 13px;
        font-weight: 700;
        color: #334155;
      }

      input[type="file"], input[type="text"] {
        width: 100%;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        background: #fff;
        color: var(--ink);
        font: inherit;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .check-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 14px 0;
        color: #334155;
        font-size: 14px;
      }

      .check-row input { width: 16px; height: 16px; }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 12px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      button.primary:hover { background: var(--accent-dark); }
      button:disabled { opacity: .55; cursor: not-allowed; }

      .status {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 9px 10px;
        background: #f8fafc;
        color: #334155;
      }

      .status.ok { border-color: #86efac; color: var(--ok); background: #f0fdf4; }
      .status.error { border-color: #fecaca; color: var(--danger); background: #fef2f2; }

      .preview-wrap {
        height: calc(100vh - 140px);
        min-height: 640px;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .log {
        margin-top: 12px;
        max-height: 180px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
        background: #0f172a;
        color: #dbeafe;
        font: 12px/1.45 Consolas, "Courier New", monospace;
        white-space: pre-wrap;
      }

      @media (max-width: 860px) {
        header, .grid { display: block; }
        .panel { margin-bottom: 16px; }
        .row { grid-template-columns: 1fr; }
        .preview-wrap { height: 70vh; min-height: 480px; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>RPL Report Generator V1.0</h1>
        <div id="status" class="status">Ready.</div>
      </header>

      <div class="grid">
        <section class="panel" aria-labelledby="controlsTitle">
          <h2 id="controlsTitle">Transcript</h2>
          <label for="transcriptFile">Transcript file</label>
          <input id="transcriptFile" type="file" accept=".txt,.text,.log,.md,.html,.htm,.json">

          <div class="row">
            <div>
              <label for="fullName">Candidate name</label>
              <input id="fullName" type="text" autocomplete="off">
            </div>
            <div>
              <label for="contactId">Contact ID</label>
              <input id="contactId" type="text" autocomplete="off">
            </div>
          </div>

          <label for="qualification">Qualification</label>
          <input id="qualification" type="text" value="FNS50322 Diploma of Finance and Mortgage Broking Management" autocomplete="off">

          <div class="row">
            <div>
              <label for="industry">Industry</label>
              <input id="industry" type="text" autocomplete="off">
            </div>
            <div>
              <label for="jobTitle">Job title</label>
              <input id="jobTitle" type="text" autocomplete="off">
            </div>
          </div>

          <label for="interviewDate">Interview date</label>
          <input id="interviewDate" type="text" autocomplete="off">

          <label class="check-row" for="sendWebhook">
            <input id="sendWebhook" type="checkbox" checked>
            Send final report webhook
          </label>

          <div class="actions">
            <button id="generateBtn" class="primary" type="button" disabled>Generate Report</button>
            <button id="openBtn" type="button" disabled>Open HTML</button>
            <button id="downloadBtn" type="button" disabled>Download HTML</button>
          </div>

          <div id="log" class="log" aria-live="polite"></div>
        </section>

        <section class="panel preview-wrap" aria-labelledby="previewTitle">
          <h2 id="previewTitle">Preview</h2>
          <iframe id="previewFrame" title="Generated report preview"></iframe>
        </section>
      </div>
    </main>

    <script src="rpl-preliminary-review.js"></script>
    <script>
      const FINAL_REPORT_WEBHOOK_URL = "https://default63871d3cd05d49fa86b6420054699f.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/ad445c5a35534861933f60ee864eecfa/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=qiOM0ZtGoUf_75xUdMZJ6B5zVSzpc9qYVZJbEbYm6pM";

      const reportModule = window.RplPreliminaryReview;
      const transcriptFileEl = document.getElementById("transcriptFile");
      const fullNameEl = document.getElementById("fullName");
      const contactIdEl = document.getElementById("contactId");
      const qualificationEl = document.getElementById("qualification");
      const industryEl = document.getElementById("industry");
      const jobTitleEl = document.getElementById("jobTitle");
      const interviewDateEl = document.getElementById("interviewDate");
      const sendWebhookEl = document.getElementById("sendWebhook");
      const generateBtn = document.getElementById("generateBtn");
      const openBtn = document.getElementById("openBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const statusEl = document.getElementById("status");
      const logEl = document.getElementById("log");
      const previewFrame = document.getElementById("previewFrame");

      let transcriptText = "";
      let lastReportHtml = "";
      let loadedTranscriptMetadata = {};

      const setStatus = (text, type = "") => {
        statusEl.textContent = text;
        statusEl.className = type ? `status ${type}` : "status";
      };

      const log = (text) => {
        const stamp = new Date().toLocaleTimeString();
        logEl.textContent += `[${stamp}] ${text}\n`;
        logEl.scrollTop = logEl.scrollHeight;
      };

      const cleanValue = (value) => String(value || "").trim();

      const getCandidateMetadata = () => ({
        fullName: cleanValue(fullNameEl.value),
        candidateName: cleanValue(fullNameEl.value),
        contactId: cleanValue(contactIdEl.value),
        qualification: cleanValue(qualificationEl.value),
        interviewDate: cleanValue(interviewDateEl.value),
        industry: cleanValue(industryEl.value),
        jobTitle: cleanValue(jobTitleEl.value),
      });

      const getReportOptions = () => ({
        outputMode: "html",
        includeTranscriptWarnings: false,
        qualificationDefault: "FNS50322 Diploma of Finance and Mortgage Broking Management",
        reportDate: new Date().toLocaleString(),
        maxBatchChars: 16000,
      });

      const applyParsedMetadata = (text) => {
        const metadata = reportModule.parseTranscriptMetadata(text);
        loadedTranscriptMetadata = metadata;
        if (metadata.candidateName) fullNameEl.value = metadata.candidateName;
        if (metadata.contactId) contactIdEl.value = metadata.contactId;
        if (metadata.industry) industryEl.value = metadata.industry;
        if (metadata.jobTitle) jobTitleEl.value = metadata.jobTitle;
        if (metadata.interviewDate || metadata.initialStartDate) {
          interviewDateEl.value = metadata.interviewDate || metadata.initialStartDate;
        }
      };

      const getWebhookIdentityFromTranscript = () => {
        const metadata = reportModule.parseTranscriptMetadata(transcriptText || "");
        loadedTranscriptMetadata = metadata;
        const fullName = cleanValue(metadata.candidateName);
        const contactId = cleanValue(metadata.contactId);
        if (!fullName || !contactId) {
          throw new Error("The loaded transcript must include both 'Name:' and 'Contact ID:' lines before the final report webhook can be sent.");
        }
        return { fullName, contactId };
      };

      const callTextModel = async (prompt, options = {}) => {
        const mode = options.mode || "final";
        const maxTokens = Number.isFinite(Number(options.max_tokens)) ? Number(options.max_tokens) : 300;
        log(`Calling /api/analysis/chat (${mode}, ${maxTokens} tokens)`);
        const response = await fetch("/api/analysis/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-rpl-mode": mode,
          },
          body: JSON.stringify({
            prompt,
            temperature: typeof options.temperature === "number" ? options.temperature : 0.1,
            max_tokens: maxTokens,
          }),
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(`AI report analysis failed (${response.status}) ${response.statusText} ${text}`.trim());
        }

        const json = await response.json();
        const content = json?.content || json?.response || json?.text || json?.raw?.choices?.[0]?.message?.content || json?.raw?.choices?.[0]?.text;
        if (typeof content === "string" && content.trim()) return content.trim();
        throw new Error("AI report analysis returned no text content.");
      };

      const buildQuestionAnalysisPromptForBatch = (batch, candidateMetadata) => {
        const questionSpecs = batch.map((item) => item.officialQuestionSpec || {
          questionNumber: item.questionNumber,
          section: item.section || "Not supplied in question bank",
          questionText: item.parsedQuestionBlock?.transcriptQuestionText || "",
          hints: item.parsedQuestionBlock?.transcriptHint || "",
          objective: item.parsedQuestionBlock?.transcriptObjective || "",
        });
        const parsedQuestionBlocks = batch.map((item) => item.parsedQuestionBlock || {
          questionNumber: item.questionNumber,
          transcriptQuestionText: item.officialQuestionSpec?.questionText || "",
          attempts: [],
          assessorBotMessages: [],
          rawBlockText: "",
        });
        return reportModule.buildQuestionAnalysisPrompt({
          candidateMetadata,
          questionSpecs,
          parsedQuestionBlocks,
        });
      };

      const analysePreliminaryQuestionBatch = async (batch, candidateMetadata, batchNumber, totalBatches) => {
        const prompt = buildQuestionAnalysisPromptForBatch(batch, candidateMetadata);
        const estimatedTokens = Math.min(12000, Math.max(2400, 1200 + batch.length * 1200 + Math.ceil(prompt.length / 6)));
        setStatus(`Analysing report questions batch ${batchNumber} of ${totalBatches}...`);
        const responseText = await callTextModel(prompt, {
          mode: "final",
          temperature: 0.1,
          max_tokens: estimatedTokens,
        });
        const parsed = reportModule.parseQuestionAnalysisResponse(responseText);
        return Array.isArray(parsed.questions) ? parsed.questions : [];
      };

      const isMissingFinalAiConfigError = (error) => /Missing required RPL_FINAL_\* environment variables/i.test(error?.message || String(error || ""));

      const getMissingFinalAiConfigWarning = () => "AI analysis warning: final AI model configuration is not available, so this report was generated from transcript source signals only.";

      const analysePreliminaryQuestions = async (manifest, candidateMetadata, reportOptions) => {
        const batches = reportModule.buildQuestionAnalysisBatches(manifest, reportOptions);
        const analyses = [];
        const warnings = [];
        for (let index = 0; index < batches.length; index += 1) {
          const batch = batches[index];
          try {
            analyses.push(...await analysePreliminaryQuestionBatch(batch, candidateMetadata, index + 1, batches.length));
          } catch (batchError) {
            log(`Batch ${index + 1} failed: ${batchError?.message || String(batchError)}`);
            if (isMissingFinalAiConfigError(batchError)) {
              const warning = getMissingFinalAiConfigWarning();
              warnings.push(warning);
              log("RPL_FINAL_* is not configured; using transcript-source fallback report and skipping remaining AI analysis calls.");
              return { analyses, warnings };
            }
            if (batch.length <= 1) {
              warnings.push(`AI analysis warning: Question ${batch[0]?.questionNumber || index + 1} could not be analysed by the model and was classified from transcript source signals only.`);
              continue;
            }
            warnings.push(`AI analysis warning: batch ${index + 1} was retried as individual questions after the first attempt failed.`);
            for (let singleIndex = 0; singleIndex < batch.length; singleIndex += 1) {
              const singleQuestion = batch[singleIndex];
              try {
                analyses.push(...await analysePreliminaryQuestionBatch([singleQuestion], candidateMetadata, singleIndex + 1, batch.length));
              } catch (singleError) {
                log(`Question ${singleQuestion?.questionNumber || singleIndex + 1} failed: ${singleError?.message || String(singleError)}`);
                if (isMissingFinalAiConfigError(singleError)) {
                  const warning = getMissingFinalAiConfigWarning();
                  warnings.push(warning);
                  log("RPL_FINAL_* is not configured; using transcript-source fallback report and skipping remaining AI analysis calls.");
                  return { analyses, warnings };
                }
                warnings.push(`AI analysis warning: Question ${singleQuestion?.questionNumber || singleIndex + 1} could not be analysed by the model and was classified from transcript source signals only.`);
              }
            }
          }
        }
        return { analyses, warnings };
      };

      const buildPreliminaryReviewReport = async ({ fullTranscriptText, candidateMetadata, reportOptions }) => {
        const parsedQuestionBlocks = reportModule.parseTranscriptQuestions(fullTranscriptText);
        const manifest = reportModule.buildQuestionManifest([], parsedQuestionBlocks);
        const { analyses, warnings } = await analysePreliminaryQuestions(manifest, candidateMetadata, reportOptions);
        const model = reportModule.buildReportModel({
          fullTranscript: fullTranscriptText,
          candidateMetadata,
          officialQuestionBank: [],
          reportOptions,
          questionAnalyses: analyses,
        });
        model.warnings.push(...warnings);
        const html = reportModule.renderReportHtml(model);
        const validation = reportModule.validateReportHtmlCoverage(model, html);
        if (!validation.valid) {
          throw new Error(`Generated report coverage validation failed: expected ${validation.questionCount} question row(s), got ${validation.statusRows} status row(s) and ${validation.articleCount} article(s).`);
        }
        return { html, model, validation };
      };

      const sendFinalReportWebhook = async (html) => {
        const identity = getWebhookIdentityFromTranscript();
        const payload = {
          FullName: identity.fullName,
          ContactID: identity.contactId,
          FinalReport: html,
        };
        setStatus("Sending final report webhook...");
        log(`Final report webhook payload identity: ${payload.FullName} (${payload.ContactID})`);
        const response = await fetch(FINAL_REPORT_WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        log(`Final report webhook: ${response.status} ${response.statusText}`);
        if (!response.ok) {
          throw new Error(`Final report webhook failed (${response.status}) ${response.statusText}`.trim());
        }
      };

      transcriptFileEl.addEventListener("change", async () => {
        const file = transcriptFileEl.files && transcriptFileEl.files[0];
        transcriptText = "";
        lastReportHtml = "";
        previewFrame.removeAttribute("srcdoc");
        openBtn.disabled = true;
        downloadBtn.disabled = true;
        generateBtn.disabled = true;
        if (!file) {
          setStatus("Ready.");
          return;
        }
        try {
          transcriptText = await file.text();
          applyParsedMetadata(transcriptText);
          const questionCount = reportModule.parseTranscriptQuestions(transcriptText).length;
          generateBtn.disabled = !questionCount;
          setStatus(`Loaded ${questionCount} question block(s).`, questionCount ? "ok" : "error");
          log(`Loaded transcript file: ${file.name}`);
        } catch (error) {
          loadedTranscriptMetadata = {};
          setStatus(error?.message || "Unable to load transcript file.", "error");
        }
      });

      generateBtn.addEventListener("click", async () => {
        if (!transcriptText.trim()) {
          setStatus("Load a transcript file first.", "error");
          return;
        }
        generateBtn.disabled = true;
        openBtn.disabled = true;
        downloadBtn.disabled = true;
        try {
          const candidateMetadata = getCandidateMetadata();
          const reportOptions = getReportOptions();
          setStatus("Generating preliminary review report...");
          const { html, validation } = await buildPreliminaryReviewReport({
            fullTranscriptText: transcriptText,
            candidateMetadata,
            reportOptions,
          });
          lastReportHtml = html;
          previewFrame.srcdoc = html;
          log(`Report generated: ${validation.questionCount} question article(s).`);
          if (sendWebhookEl.checked) {
            await sendFinalReportWebhook(html);
          }
          openBtn.disabled = false;
          downloadBtn.disabled = false;
          setStatus(sendWebhookEl.checked ? "Report generated and webhook sent." : "Report generated.", "ok");
        } catch (error) {
          setStatus(error?.message || "Unable to generate report.", "error");
          log(error?.stack || error?.message || String(error));
        } finally {
          generateBtn.disabled = !transcriptText.trim();
        }
      });

      openBtn.addEventListener("click", () => {
        if (!lastReportHtml) return;
        const reportWindow = window.open("", "RPLGeneratedReport", "width=1000,height=800,scrollbars=yes");
        if (!reportWindow) {
          setStatus("Popup blocked. Please allow pop-ups to open the report.", "error");
          return;
        }
        reportWindow.document.open();
        reportWindow.document.write(lastReportHtml);
        reportWindow.document.close();
      });

      downloadBtn.addEventListener("click", () => {
        if (!lastReportHtml) return;
        const blob = new Blob([lastReportHtml], { type: "text/html" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "RPL Preliminary Interview Review.html";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(link.href);
      });

      if (!reportModule) {
        setStatus("Report module did not load.", "error");
      }
    </script>
  </body>
</html>
