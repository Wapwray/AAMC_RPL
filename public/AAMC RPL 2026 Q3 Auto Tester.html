<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AAMC RPL Quiz - Q3 Auto Tester</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f6f9;
        color: #0f172a;
      }

      .boot {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .bootCard {
        width: min(760px, 100%);
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      }

      .bootTitle {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .bootText {
        margin: 0 0 12px;
        color: #475569;
        line-height: 1.5;
      }

      .bootField {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .bootField input[type="file"] {
        max-width: 100%;
      }

      .bootActions {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .bootActions button {
        border: 1px solid #94a3b8;
        background: #0b6ea9;
        color: #fff;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 13px;
        cursor: pointer;
      }

      .bootActions button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .bootStatus {
        margin: 10px 0 0;
        min-height: 18px;
        font-size: 12px;
        color: #334155;
      }

      .answersTableWrap {
        display: none;
        margin-top: 20px;
        overflow: auto;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #fff;
      }

      .answersTableWrap.visible {
        display: block;
      }

      .answersTable {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      .answersTable th,
      .answersTable td {
        padding: 8px;
        border-bottom: 1px solid #e2e8f0;
        vertical-align: top;
        text-align: left;
        white-space: pre-wrap;
      }

      .answersTable th {
        background: #f8fafc;
      }
    </style>
  </head>
  <body>
    <main class="boot">
      <section class="bootCard">
        <h1 class="bootTitle">AAMC RPL 2026 Q3 Auto Tester</h1>
        <p class="bootText">Upload a previous student transcript JSON before entering the assessment. The Auto Tester page will open after the file is validated.</p>
        <div class="bootField">
          <label for="bootTranscriptFile">Transcript .json file</label>
          <input id="bootTranscriptFile" type="file" accept="application/json,.json" />
        </div>
        <div class="bootActions">
          <button id="generateAnswersBtn" type="button" disabled>Generate Answers Table</button>
          <button id="bootContinueBtn" type="button" disabled>Open Auto Tester Page</button>
        </div>
        <p id="bootStatus" class="bootStatus">Choose a transcript .json file to continue.</p>
        <div id="answersTableWrap" class="answersTableWrap" aria-live="polite"></div>
      </section>
    </main>

    <script>
      const SOURCE_FILE = "AAMC RPL 2026.html";
      const SESSION_JSON_KEY = "rpl_auto_tester_uploaded_json";
      const RUNTIME_VERSION = "1.9";

      const replaceOnce = (text, matcher, replacement) => {
        const next = text.replace(matcher, replacement);
        return next;
      };

      const setBootStatus = (message) => {
        const el = document.getElementById("bootStatus");
        if (el) el.textContent = message;
      };

      const boot = async () => {
        try {
          setBootStatus("Opening Auto Tester page...");
          const target = new URL(SOURCE_FILE, window.location.href);
          const current = new URL(window.location.href);
          ["fullName", "givenName", "contactId"].forEach((name) => {
            const value = current.searchParams.get(name);
            if (value) target.searchParams.set(name, value);
          });
          target.searchParams.set("autoTester", "1");
          target.searchParams.set("autoTesterVersion", RUNTIME_VERSION);
          window.location.assign(target.href);
        } catch (error) {
          const message = error?.message || String(error);
          document.body.innerHTML = `
            <main class="boot">
              <section class="bootCard">
                <h1 class="bootTitle">Q3 Auto Tester Load Failed</h1>
                <p class="bootText">${message.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")}</p>
              </section>
            </main>
          `;
        }
      };

      const removeDebugPanelMarkup = (html) => {
        return html.replace(/<div class="checkResponseDebug"[\s\S]*?<\/pre>\s*<\/div>/g, "");
      };

      const removeDebugFunctions = (html) => {
        let next = html;

        next = replaceOnce(
          next,
          /const clearCheckResponseDebug = \(message = "Waiting for Check Response\.\.\."\) => \{[\s\S]*?\n      \};\n\n      const appendCheckResponseDebug = \(label, payload\) => \{[\s\S]*?\n      \};/,
          'const clearCheckResponseDebug = () => {};\n\n      const appendCheckResponseDebug = () => {};'
        );

        next = replaceOnce(
          next,
          /const withCheckResponseTiming = async \(label, task\) => \{[\s\S]*?\n      \};/,
          'const withCheckResponseTiming = async (_label, task) => task();'
        );

        next = next.replace(/\n\s*clearCheckResponseDebugBtn\?\.addEventListener\("click", \(\) => \{[\s\S]*?\n\s*\}\);/g, "");

        return next;
      };

      const patchParseListItems = (html) => {
        const replacement = `const parseListItems = (json) => {
        if (!json || (json.listitems === undefined && json.listItems === undefined && json.items === undefined)) {
          return { items: [], error: "Response does not include listitems." };
        }

        const raw = json.listitems ?? json.listItems ?? json.items;
        if (Array.isArray(raw)) {
          return { items: raw, error: raw.length ? null : "No questions returned." };
        }

        if (typeof raw === "string") {
          try {
            const parsed = JSON.parse(raw);
            if (!Array.isArray(parsed)) {
              return { items: [], error: "listitems is not an array." };
            }
            return { items: parsed, error: parsed.length ? null : "No questions returned." };
          } catch (parseError) {
            return { items: [], error: parseError?.message || String(parseError) };
          }
        }

        return { items: [], error: "Unsupported listitems payload shape." };
      };`;

        return replaceOnce(
          html,
          /const parseListItems = \(json\) => \{[\s\S]*?\n      \};/,
          replacement
        );
      };

      const patchTimeouts = (html) => {
        let next = html;

        next = next.replace(
          /const response = await fetch\(questionsUrl, \{\n\s*method: "POST",\n\s*headers: \{ "Content-Type": "application\/json" \},\n\s*\}\);/,
          'const response = await fetchWithTimeout(questionsUrl, {\n          method: "POST",\n          headers: { "Content-Type": "application/json" },\n        }, 15000);'
        );

        next = next.replace(
          /const response = await fetch\(url, \{\n\s*method: "POST",\n\s*headers: \{ "Content-Type": "application\/json" \},\n\s*body: JSON\.stringify\(payload\),\n\s*\}\);/g,
          'const response = await fetchWithTimeout(url, {\n            method: "POST",\n            headers: { "Content-Type": "application/json" },\n            body: JSON.stringify(payload),\n          }, 20000);'
        );

        return next;
      };

      const patchTitle = (html) => {
        let next = html.replace(/<title>[\s\S]*?<\/title>/, "<title>AAMC RPL Quiz - Q3 Auto Tester</title>");
        next = next.replace(/AAMC RPL Quiz - V1\.0/g, "AAMC RPL Quiz - V1.9 Auto Tester");
        next = next.replace(/AAMC RPL Quiz - V1\.7/g, "AAMC RPL Quiz - V1.9 Auto Tester");
        next = next.replace(/V3\.0-Ornith/g, "V1.9 Auto Tester");
        return next;
      };

      const patchResponseClearOnAttempt = (html) => {
        return html.replace(
          /currentAttempts \+= 1;\n\s*currentResponses\.push\(answer\);\n\s*const currentQuestion = questions\[currentIndex\];/,
          'currentAttempts += 1;\n        currentResponses.push(answer);\n        answerInputEl.value = "";\n        const currentQuestion = questions[currentIndex];'
        );
      };

      const patchTranscriptPayloads = (html) => {
        let next = html;

        next = next.replace(
          /FullTranscript: fullTranscript,\n\s*FullTranscriptJSON: buildFullTranscriptJson\(\),/,
          'FullTranscript: buildFullTranscript(),\n          FullTranscriptJson: buildFullTranscriptJson(),\n          FullTranscriptJSON: buildFullTranscriptJson(),'
        );

        next = next.replace(
          /FullTranscript: fullTranscript \|\| buildFullTranscript\(\),\n\s*FullTranscriptJson: buildFullTranscriptJson\(\),/,
          'FullTranscript: buildFullTranscript(),\n              FullTranscriptJson: buildFullTranscriptJson(),\n              FullTranscriptJSON: buildFullTranscriptJson(),'
        );

        return next;
      };

      const removeDebugSectionStyles = (html) => {
        return html
          .replace(/\.checkResponseDebug\s*\{[\s\S]*?\}\s*\.checkResponseDebugHeader\s*\{[\s\S]*?\}\s*\.checkResponseDebugHeader button\s*\{[\s\S]*?\}\s*\.checkResponseDebugLog\s*\{[\s\S]*?\}/, "");
      };

      const wireBootGate = () => {
        const fileInput = document.getElementById("bootTranscriptFile");
        const generateBtn = document.getElementById("generateAnswersBtn");
        const continueBtn = document.getElementById("bootContinueBtn");
        const tableWrap = document.getElementById("answersTableWrap");
        let selectedJsonText = "";
        let selectedTranscript = null;

        const renderAnswersTable = () => {
          const questions = selectedTranscript && Array.isArray(selectedTranscript.questions)
            ? selectedTranscript.questions
            : [];
          const rows = [];
          questions.forEach((question) => {
            const attempts = Array.isArray(question.attempts) ? question.attempts : [];
            attempts.forEach((attempt, index) => rows.push({ question, attempt, index }));
          });

          if (rows.length === 0) {
            throw new Error("The transcript contains no question attempts to display.");
          }

          const table = document.createElement("table");
          table.className = "answersTable";
          const headerRow = table.insertRow();
          ["Question number", "Attempt number", "Question", "Answer"].forEach((label) => {
            const headerCell = document.createElement("th");
            headerCell.textContent = label;
            headerRow.appendChild(headerCell);
          });
          rows.forEach((entry) => {
            const row = table.insertRow();
            [
              entry.question.questionNumber,
              entry.attempt.attemptNumber || entry.index + 1,
              entry.question.questionText,
              entry.attempt.answer,
            ].forEach((value) => {
              const cell = row.insertCell();
              cell.textContent = value === undefined || value === null ? "" : String(value);
            });
          });
          tableWrap.replaceChildren(table);
          tableWrap.classList.add("visible");
          continueBtn.disabled = false;
          setBootStatus(`Generated ${rows.length} answer row(s). The table is ready for automation.`);
        };

        fileInput?.addEventListener("change", async (event) => {
          const file = event.target?.files?.[0];
          selectedJsonText = "";
          selectedTranscript = null;
          continueBtn.disabled = true;
          generateBtn.disabled = true;
          tableWrap.classList.remove("visible");
          tableWrap.innerHTML = "";
          if (!file) {
            setBootStatus("Choose a transcript .json file to continue.");
            return;
          }
          try {
            const text = await file.text();
            const transcript = JSON.parse(text);
            if (!Array.isArray(transcript?.questions)) {
              throw new Error("JSON must contain a questions array.");
            }
            selectedJsonText = text;
            selectedTranscript = transcript;
            setBootStatus(`Loaded ${file.name}. Generate the Answers Table to continue.`);
            generateBtn.disabled = false;
          } catch (error) {
            const message = error?.message || String(error);
            setBootStatus(`Invalid JSON file: ${message}`);
          }
        });

        generateBtn?.addEventListener("click", () => {
          try {
            renderAnswersTable();
          } catch (error) {
            const message = error?.message || String(error);
            setBootStatus(`Could not generate answers table: ${message}`);
          }
        });

        continueBtn?.addEventListener("click", async () => {
          if (!selectedJsonText) {
            setBootStatus("Choose a transcript .json file first.");
            return;
          }
          try {
            sessionStorage.setItem(SESSION_JSON_KEY, selectedJsonText);
          } catch {
            setBootStatus("Could not retain the uploaded transcript for the Auto Tester.");
            return;
          }
          continueBtn.disabled = true;
          await boot();
        });
      };

      wireBootGate();
    </script>
  </body>
</html>
