<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AAMC RPL Quiz - Q3 Auto Tester</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f6f9;
        color: #0f172a;
      }

      .boot {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .bootCard {
        width: min(760px, 100%);
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      }

      .bootTitle {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .bootText {
        margin: 0;
        color: #475569;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="boot">
      <section class="bootCard">
        <h1 class="bootTitle">Loading AAMC RPL 2026 Q3 Auto Tester...</h1>
        <p class="bootText">Applying Q3 updates plus transcript-driven automation for end-to-end testing.</p>
      </section>
    </main>

    <script>
      const SOURCE_FILE = "AAMC RPL 2026.html";

      const replaceOnce = (text, matcher, replacement) => {
        const next = text.replace(matcher, replacement);
        return next;
      };

      const removeDebugPanelMarkup = (html) => {
        return html.replace(/<div class="checkResponseDebug"[\s\S]*?<\/pre>\s*<\/div>/g, "");
      };

      const removeDebugFunctions = (html) => {
        let next = html;

        next = replaceOnce(
          next,
          /const clearCheckResponseDebug = \(message = "Waiting for Check Response\.\.\."\) => \{[\s\S]*?\n      \};\n\n      const appendCheckResponseDebug = \(label, payload\) => \{[\s\S]*?\n      \};/,
          'const clearCheckResponseDebug = () => {};\n\n      const appendCheckResponseDebug = () => {};'
        );

        next = replaceOnce(
          next,
          /const withCheckResponseTiming = async \(label, task\) => \{[\s\S]*?\n      \};/,
          'const withCheckResponseTiming = async (_label, task) => task();'
        );

        next = next.replace(/\n\s*clearCheckResponseDebugBtn\?\.addEventListener\("click", \(\) => \{[\s\S]*?\n\s*\}\);/g, "");

        return next;
      };

      const patchParseListItems = (html) => {
        const replacement = `const parseListItems = (json) => {
        if (!json || (json.listitems === undefined && json.listItems === undefined && json.items === undefined)) {
          return { items: [], error: "Response does not include listitems." };
        }

        const raw = json.listitems ?? json.listItems ?? json.items;
        if (Array.isArray(raw)) {
          return { items: raw, error: raw.length ? null : "No questions returned." };
        }

        if (typeof raw === "string") {
          try {
            const parsed = JSON.parse(raw);
            if (!Array.isArray(parsed)) {
              return { items: [], error: "listitems is not an array." };
            }
            return { items: parsed, error: parsed.length ? null : "No questions returned." };
          } catch (parseError) {
            return { items: [], error: parseError?.message || String(parseError) };
          }
        }

        return { items: [], error: "Unsupported listitems payload shape." };
      };`;

        return replaceOnce(
          html,
          /const parseListItems = \(json\) => \{[\s\S]*?\n      \};/,
          replacement
        );
      };

      const patchTimeouts = (html) => {
        let next = html;

        next = next.replace(
          /const response = await fetch\(questionsUrl, \{\n\s*method: "POST",\n\s*headers: \{ "Content-Type": "application\/json" \},\n\s*\}\);/,
          'const response = await fetchWithTimeout(questionsUrl, {\n          method: "POST",\n          headers: { "Content-Type": "application/json" },\n        }, 15000);'
        );

        next = next.replace(
          /const response = await fetch\(url, \{\n\s*method: "POST",\n\s*headers: \{ "Content-Type": "application\/json" \},\n\s*body: JSON\.stringify\(payload\),\n\s*\}\);/g,
          'const response = await fetchWithTimeout(url, {\n            method: "POST",\n            headers: { "Content-Type": "application/json" },\n            body: JSON.stringify(payload),\n          }, 20000);'
        );

        return next;
      };

      const patchTitle = (html) => {
        let next = html.replace(/<title>[\s\S]*?<\/title>/, "<title>AAMC RPL Quiz - Q3 Auto Tester</title>");
        next = next.replace(/AAMC RPL Quiz - V1\.0/g, "AAMC RPL Quiz - V1.7 Auto Tester");
        next = next.replace(/AAMC RPL Quiz - V1\.7/g, "AAMC RPL Quiz - V1.7 Auto Tester");
        next = next.replace(/V3\.0-Ornith/g, "V1.7 Auto Tester");
        return next;
      };

      const patchResponseClearOnAttempt = (html) => {
        return html.replace(
          /currentAttempts \+= 1;\n\s*currentResponses\.push\(answer\);\n\s*const currentQuestion = questions\[currentIndex\];/,
          'currentAttempts += 1;\n        currentResponses.push(answer);\n        answerInputEl.value = "";\n        const currentQuestion = questions[currentIndex];'
        );
      };

      const patchTranscriptPayloads = (html) => {
        let next = html;

        next = next.replace(
          /FullTranscript: fullTranscript,\n\s*FullTranscriptJSON: buildFullTranscriptJson\(\),/,
          'FullTranscript: buildFullTranscript(),\n          FullTranscriptJson: buildFullTranscriptJson(),\n          FullTranscriptJSON: buildFullTranscriptJson(),'
        );

        next = next.replace(
          /FullTranscript: fullTranscript \|\| buildFullTranscript\(\),\n\s*FullTranscriptJson: buildFullTranscriptJson\(\),/,
          'FullTranscript: buildFullTranscript(),\n              FullTranscriptJson: buildFullTranscriptJson(),\n              FullTranscriptJSON: buildFullTranscriptJson(),'
        );

        return next;
      };

      const removeDebugSectionStyles = (html) => {
        return html
          .replace(/\.checkResponseDebug\s*\{[\s\S]*?\}\s*\.checkResponseDebugHeader\s*\{[\s\S]*?\}\s*\.checkResponseDebugHeader button\s*\{[\s\S]*?\}\s*\.checkResponseDebugLog\s*\{[\s\S]*?\}/, "");
      };

      const injectAutoTester = (html) => {
        const autoScript = `
<script>
(() => {
  const REPORT_BASE = "https://aamc-rpl-live-ecgua6ceb4fkgfh0.australiaeast-01.azurewebsites.net/RPL%20Report%20Generator%20-%20Assessor.html";
  const CONTINUE_SIGNAL = /next question button to continue|press the next button to continue/i;
  const FEEDBACK_SIGNAL = /you can add this by pressing the start transcription button|if you cannot add any more, you can move to the next question|some additional detail is required|thanks for that/i;

  const state = {
    loaded: null,
    running: false,
    stopped: false,
    currentQuestion: null,
    nextAttemptIndex: 0,
    logLines: [],
  };

  const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

  const waitFor = async (predicate, timeoutMs = 60000, intervalMs = 120) => {
    const started = Date.now();
    while (Date.now() - started < timeoutMs) {
      let ok = false;
      try { ok = Boolean(predicate()); } catch {}
      if (ok) return true;
      await wait(intervalMs);
    }
    return false;
  };

  const byId = (id) => document.getElementById(id);

  const panelCss = `
    #autoTesterPanel {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: min(460px, calc(100vw - 32px));
      z-index: 99999;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      box-shadow: 0 16px 28px rgba(15, 23, 42, 0.2);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: #0f172a;
    }
    #autoTesterPanelHeader {
      font-weight: 700;
      font-size: 14px;
      padding: 10px 12px;
      border-bottom: 1px solid #e2e8f0;
      background: #f8fafc;
      border-radius: 12px 12px 0 0;
    }
    #autoTesterPanelBody {
      padding: 10px 12px 12px;
      display: grid;
      gap: 8px;
    }
    #autoTesterPanelBody .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    #autoTesterPanelBody button {
      border: 1px solid #94a3b8;
      background: #0b6ea9;
      color: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    #autoTesterStopBtn {
      background: #9f1239;
    }
    #autoTesterStatus {
      font-size: 12px;
      color: #334155;
      min-height: 18px;
      white-space: pre-wrap;
    }
    #autoTesterLog {
      margin: 0;
      background: #0f172a;
      color: #dbeafe;
      border-radius: 8px;
      padding: 10px;
      min-height: 120px;
      max-height: 220px;
      overflow: auto;
      font-size: 11px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
  `;

  const installPanel = () => {
    const style = document.createElement("style");
    style.textContent = panelCss;
    document.head.appendChild(style);

    const panel = document.createElement("div");
    panel.id = "autoTesterPanel";
    panel.innerHTML = `
      <div id="autoTesterPanelHeader">Q3 Auto Tester</div>
      <div id="autoTesterPanelBody">
        <div class="row">
          <input id="autoTesterFileInput" type="file" accept="application/json,.json" />
        </div>
        <div class="row">
          <button id="autoTesterStartBtn" type="button">Start Auto Test</button>
          <button id="autoTesterStopBtn" type="button">Stop</button>
        </div>
        <div id="autoTesterStatus">Load a transcript JSON, then click Start Auto Test.</div>
        <pre id="autoTesterLog">Ready.</pre>
      </div>
    `;
    document.body.appendChild(panel);
  };

  const addLog = (label, detail) => {
    const stamp = new Date().toLocaleTimeString();
    const text = detail === undefined ? label : `\${label}: \${typeof detail === "string" ? detail : JSON.stringify(detail)}`;
    state.logLines.push(`[\${stamp}] \${text}`);
    if (state.logLines.length > 300) state.logLines = state.logLines.slice(-300);
    const el = byId("autoTesterLog");
    if (el) {
      el.textContent = state.logLines.join("\n");
      el.scrollTop = el.scrollHeight;
    }
  };

  const setStatus = (message) => {
    const el = byId("autoTesterStatus");
    if (el) el.textContent = message;
  };

  const normalizeString = (value) => String(value === undefined || value === null ? "" : value).trim();

  const getGivenNameFromFullName = (fullName) => {
    const parts = normalizeString(fullName).split(/\s+/).filter(Boolean);
    return parts[0] || "";
  };

  const parseTranscriptJson = (json) => {
    const candidate = json && typeof json === "object" ? (json.candidate || {}) : {};
    const fullName = normalizeString(candidate.fullName || json?.fullName || "");
    const givenName = normalizeString(candidate.givenName || json?.givenName || getGivenNameFromFullName(fullName));
    const contactId = normalizeString(candidate.contactId || json?.contactId || "");
    const industry = normalizeString(candidate.industry || json?.industry || "Lending");
    const jobTitle = normalizeString(candidate.jobTitle || json?.jobTitle || "Mortgage Broker");

    const questionMap = new Map();
    const questions = Array.isArray(json?.questions) ? json.questions : [];
    questions.forEach((question) => {
      const questionNumber = normalizeString(question?.questionNumber);
      if (!questionNumber) return;
      const attempts = Array.isArray(question?.attempts)
        ? question.attempts
            .map((attempt) => normalizeString(attempt?.answer || attempt?.responseText || attempt?.response || ""))
            .filter(Boolean)
        : [];
      questionMap.set(questionNumber, attempts);
    });

    if (!fullName || !contactId || !questionMap.size) {
      throw new Error("JSON must include candidate fullName/contactId and at least one question with attempts.");
    }

    return {
      fullName,
      givenName: givenName || getGivenNameFromFullName(fullName),
      contactId,
      industry,
      jobTitle,
      questionMap,
    };
  };

  const getCurrentQuestionNumber = () => {
    const header = normalizeString(byId("headerTitle")?.textContent || "");
    const match = header.match(/Question\s+(\d+)/i);
    return match ? match[1] : "";
  };

  const getLastAiMessage = () => {
    const entries = Array.from(document.querySelectorAll("#chatHistory .chatEntry.ai"));
    const last = entries.length ? entries[entries.length - 1] : null;
    return normalizeString(last?.textContent || "");
  };

  const getDebugLineCount = () => {
    const text = normalizeString(byId("generalDebugLog")?.textContent || "");
    if (!text) return 0;
    return text.split(/\n+/).filter(Boolean).length;
  };

  const waitForButtonEnabled = async (button, label, timeoutMs = 120000) => {
    const ok = await waitFor(() => Boolean(button && !button.disabled), timeoutMs);
    if (!ok) {
      throw new Error(`\${label} did not become enabled.`);
    }
  };

  const isCompletionVisible = () => {
    const completion = byId("completionScreen");
    return Boolean(completion && !completion.classList.contains("hidden"));
  };

  const ensureReportLink = () => {
    if (!isCompletionVisible() || !state.loaded) return;
    const completionBody = byId("completionBody");
    if (!completionBody) return;
    if (completionBody.querySelector("#autoTesterReportLink")) return;

    const { fullName, givenName, contactId } = state.loaded;
    const params = new URLSearchParams({
      fullName,
      givenName,
      contactId,
      assessorName: "Richard Wray",
      assessorEmail: "rwray@aamctraining.edu.au",
    });
    const url = `\${REPORT_BASE}?\${params.toString()}`;

    const wrap = document.createElement("div");
    wrap.style.marginTop = "12px";
    const anchor = document.createElement("a");
    anchor.id = "autoTesterReportLink";
    anchor.href = url;
    anchor.target = "_blank";
    anchor.rel = "noopener noreferrer";
    anchor.textContent = `View Report - \${fullName}`;
    anchor.style.color = "#0b6ea9";
    anchor.style.fontWeight = "700";
    wrap.appendChild(anchor);
    completionBody.appendChild(wrap);
  };

  const injectStudentContext = () => {
    if (!state.loaded) return;
    const { fullName, givenName, contactId } = state.loaded;
    window.RPLStudentInfo = { fullName, studentName: fullName, givenName, contactId };
    if (document.body && document.body.dataset) {
      document.body.dataset.fullName = fullName;
      document.body.dataset.givenName = givenName;
      document.body.dataset.contactId = contactId;
    }
  };

  const ensureAssessmentStarted = async () => {
    injectStudentContext();

    const welcomeContinue = byId("welcomeContinueBtn");
    if (welcomeContinue && !isCompletionVisible()) {
      await waitFor(() => !welcomeContinue.disabled, 90000);
      if (!welcomeContinue.disabled && !byId("quizCard")?.classList.contains("hidden")) {
        return true;
      }
      if (!welcomeContinue.disabled) {
        welcomeContinue.click();
        addLog("Welcome", "Continue clicked");
      }
    }

    await waitFor(() => !byId("postWelcomePage")?.classList.contains("hidden"), 90000);

    const industryEl = byId("industry");
    const jobTitleEl = byId("jobTitle");
    const confirmIndustryBtn = byId("confirmIndustryBtn");
    const confirmJobTitleBtn = byId("confirmJobTitleBtn");
    const beginBtn = byId("beginBtn");

    if (industryEl) {
      industryEl.value = state.loaded.industry || "Lending";
      industryEl.dispatchEvent(new Event("input", { bubbles: true }));
      industryEl.dispatchEvent(new Event("change", { bubbles: true }));
    }
    if (jobTitleEl) {
      jobTitleEl.value = state.loaded.jobTitle || "Mortgage Broker";
      jobTitleEl.dispatchEvent(new Event("input", { bubbles: true }));
      jobTitleEl.dispatchEvent(new Event("change", { bubbles: true }));
    }

    if (confirmIndustryBtn && !confirmIndustryBtn.disabled) confirmIndustryBtn.click();
    if (confirmJobTitleBtn && !confirmJobTitleBtn.disabled) confirmJobTitleBtn.click();

    await waitFor(() => beginBtn && !beginBtn.disabled, 15000).catch(() => false);
    if (beginBtn) {
      beginBtn.disabled = false;
      beginBtn.click();
      addLog("Assessment", "Begin clicked");
    }

    return waitFor(() => {
      const quizCard = byId("quizCard");
      return Boolean(quizCard && !quizCard.classList.contains("hidden"));
    }, 90000);
  };

  const waitForEvaluateCompletion = async (previousAiCount, previousDebugLines) => {
    const thinkingHidden = () => byId("thinkingOverlay")?.classList.contains("hidden") !== false;
    const gotAiResponse = await waitFor(() => {
      const aiCount = document.querySelectorAll("#chatHistory .chatEntry.ai").length;
      return thinkingHidden() && aiCount > previousAiCount;
    }, 180000);
    if (!gotAiResponse) {
      throw new Error("No AI response received after Evaluate.");
    }

    // Give background queue/debug logging a short window to record result lines.
    await waitFor(() => getDebugLineCount() > previousDebugLines, 10000, 100).catch(() => false);
  };

  const submitAttempt = async (answerText) => {
    const answerInput = byId("answerInput");
    const evaluateBtn = byId("evaluateBtn");
    if (!answerInput || !evaluateBtn) {
      throw new Error("Answer input or Evaluate button not found.");
    }

    await waitForButtonEnabled(evaluateBtn, "Evaluate button", 120000);

    answerInput.value = answerText;
    answerInput.dispatchEvent(new Event("input", { bubbles: true }));

    const previousAiCount = document.querySelectorAll("#chatHistory .chatEntry.ai").length;
    const previousDebugLines = getDebugLineCount();
    evaluateBtn.click();
    addLog("Evaluate", { answerChars: answerText.length });

    await waitForEvaluateCompletion(previousAiCount, previousDebugLines);

    const message = getLastAiMessage();
    if (!message) {
      throw new Error("AI feedback was empty after Evaluate.");
    }
    const shouldContinue = CONTINUE_SIGNAL.test(message);
    const hasFeedback = shouldContinue || FEEDBACK_SIGNAL.test(message);
    if (!hasFeedback) {
      throw new Error("AI feedback did not match expected continue/feedback patterns.");
    }
    return { shouldContinue, message };
  };

  const goNextQuestion = async () => {
    const nextBtn = byId("nextBtn");
    if (!nextBtn) throw new Error("Next Question button not found.");

    const before = getCurrentQuestionNumber();
    await waitForButtonEnabled(nextBtn, "Next Question button", 120000);
    const previousDebugLines = getDebugLineCount();
    nextBtn.click();
    addLog("Next", before ? `from question \${before}` : "clicked");

    const moved = await waitFor(() => {
      if (isCompletionVisible()) return true;
      const now = getCurrentQuestionNumber();
      return now && now !== before;
    }, 120000);
    if (!moved) {
      throw new Error("Next Question did not advance to a new question.");
    }

    // Confirm system produced follow-up debug output for the transition.
    await waitFor(() => getDebugLineCount() > previousDebugLines, 10000, 100).catch(() => false);
  };

  const runAutoTest = async () => {
    state.running = true;
    state.stopped = false;
    state.currentQuestion = null;
    state.nextAttemptIndex = 0;

    setStatus("Preparing assessment UI...");
    const started = await ensureAssessmentStarted();
    if (!started) throw new Error("Could not open the assessment question screen.");

    setStatus("Running transcript-driven attempts...");

    while (state.running && !state.stopped) {
      ensureReportLink();
      if (isCompletionVisible()) {
        setStatus("Completed. Report link added to final screen.");
        addLog("Completed", "Assessment reached completion screen");
        break;
      }

      const questionNumber = getCurrentQuestionNumber();
      if (!questionNumber) {
        await wait(250);
        continue;
      }

      if (state.currentQuestion !== questionNumber) {
        state.currentQuestion = questionNumber;
        state.nextAttemptIndex = 0;
        addLog("Question", questionNumber);
      }

      const attempts = state.loaded.questionMap.get(questionNumber) || [];

      if (state.nextAttemptIndex >= attempts.length) {
        addLog("Attempt source", `No more transcript attempts for Q\${questionNumber}; moving next.`);
        await goNextQuestion();
        continue;
      }

      const answer = attempts[state.nextAttemptIndex];
      const attemptOrdinal = state.nextAttemptIndex + 1;
      addLog("Submitting", `Q\${questionNumber} attempt \${attemptOrdinal}`);

      const result = await submitAttempt(answer);
      state.nextAttemptIndex += 1;

      if (result.shouldContinue) {
        addLog("System guidance", "Move to next question");
        await goNextQuestion();
        continue;
      }

      if (state.nextAttemptIndex >= attempts.length) {
        addLog("System guidance", `Not yet sufficient and no more transcript attempts for Q\${questionNumber}; moving next.`);
        await goNextQuestion();
      }
    }

    state.running = false;
    ensureReportLink();
  };

  const stopAutoTest = () => {
    state.stopped = true;
    state.running = false;
    setStatus("Stopped.");
    addLog("Auto tester", "Stopped by user");
  };

  const loadJsonFromFile = async (file) => {
    const text = await file.text();
    const parsed = JSON.parse(text);
    state.loaded = parseTranscriptJson(parsed);
    injectStudentContext();
    const qCount = state.loaded.questionMap.size;
    setStatus(`Loaded \${state.loaded.fullName} (\${state.loaded.contactId}) with \${qCount} question(s).`);
    addLog("JSON loaded", { fullName: state.loaded.fullName, contactId: state.loaded.contactId, questions: qCount });
  };

  const wirePanel = () => {
    const fileInput = byId("autoTesterFileInput");
    const startBtn = byId("autoTesterStartBtn");
    const stopBtn = byId("autoTesterStopBtn");

    fileInput?.addEventListener("change", async (event) => {
      const file = event.target?.files?.[0];
      if (!file) return;
      try {
        await loadJsonFromFile(file);
      } catch (error) {
        const message = error?.message || String(error);
        setStatus(`Load failed: \${message}`);
        addLog("Load failed", message);
      }
    });

    startBtn?.addEventListener("click", async () => {
      if (state.running) return;
      if (!state.loaded) {
        setStatus("Select a transcript JSON first.");
        return;
      }
      try {
        await runAutoTest();
      } catch (error) {
        const message = error?.message || String(error);
        setStatus(`Auto test failed: \${message}`);
        addLog("Auto test failed", message);
        state.running = false;
      }
    });

    stopBtn?.addEventListener("click", () => stopAutoTest());
  };

  const init = () => {
    installPanel();
    wirePanel();
    setInterval(ensureReportLink, 1000);
    addLog("Auto tester", "Ready");
  };

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init, { once: true });
  } else {
    init();
  }
})();
<\/script>
`;

        return html.replace(/<\/body>/i, `${autoScript}\n</body>`);
      };

      const applyQ3AutoTesterTransforms = (html) => {
        let next = html;
        next = patchTitle(next);
        next = removeDebugPanelMarkup(next);
        next = removeDebugFunctions(next);
        next = removeDebugSectionStyles(next);
        next = patchParseListItems(next);
        next = patchTimeouts(next);
        next = patchResponseClearOnAttempt(next);
        next = patchTranscriptPayloads(next);
        next = injectAutoTester(next);
        return next;
      };

      const boot = async () => {
        try {
          const response = await fetch(SOURCE_FILE, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`Failed to load source file: ${response.status} ${response.statusText}`);
          }
          const sourceHtml = await response.text();
          const pageHtml = applyQ3AutoTesterTransforms(sourceHtml);
          document.open();
          document.write(pageHtml);
          document.close();
        } catch (error) {
          const message = error?.message || String(error);
          document.body.innerHTML = `\n            <main class="boot">\n              <section class="bootCard">\n                <h1 class="bootTitle">Q3 Auto Tester Load Failed</h1>\n                <p class="bootText">${message.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")}</p>\n              </section>\n            </main>\n          `;
        }
      };

      boot();
    </script>
  </body>
</html>
