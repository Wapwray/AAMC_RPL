<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RPL Emailer V0.2</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f3f7fb;
        color: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(760px, 100%);
        background: #ffffff;
        border: 1px solid #d8e3ee;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        font-weight: 700;
      }

      .subtitle {
        margin: 0 0 20px;
        color: #475569;
        font-size: 14px;
        line-height: 1.5;
      }

      .formRow {
        display: grid;
        gap: 10px;
      }

      label {
        font-size: 14px;
        font-weight: 600;
      }

      input {
        width: 100%;
        border: 1px solid #c8d6e3;
        border-radius: 10px;
        font-size: 16px;
        padding: 12px;
        box-sizing: border-box;
      }

      input:focus {
        outline: 3px solid rgba(37, 99, 235, 0.2);
        border-color: #2563eb;
      }

      .actions {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .primary {
        background: #2563eb;
        color: #ffffff;
      }

      .secondary {
        background: #ffffff;
        border-color: #c8d6e3;
        color: #0f172a;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .status {
        margin-top: 16px;
        min-height: 20px;
        font-size: 14px;
      }

      .status.error {
        color: #b91c1c;
      }

      .status.success {
        color: #166534;
      }

      .responsePanel {
        margin-top: 18px;
        border: 1px solid #d8e3ee;
        border-radius: 12px;
        background: #f8fbff;
        padding: 14px;
        display: none;
      }

      .responsePanel h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .responsePanel p {
        margin: 0 0 12px;
        color: #334155;
      }

      .studentDetails {
        margin: 0;
        padding: 12px;
        border-radius: 10px;
        background: #eef4fb;
        border: 1px solid #d8e3ee;
        color: #0f172a;
        font-size: 14px;
        line-height: 1.5;
      }

      .studentRow {
        display: grid;
        grid-template-columns: 130px 1fr;
        gap: 8px;
        padding: 4px 0;
      }

      .studentLabel {
        font-weight: 700;
        color: #1e293b;
      }

      .studentValue {
        color: #0f172a;
        word-break: break-word;
      }

      .confirmActions {
        margin-top: 12px;
        display: flex;
        gap: 10px;
      }

      .managedStaffPanel {
        margin-top: 18px;
        border: 1px solid #d8e3ee;
        border-radius: 12px;
        background: #f8fbff;
        padding: 14px;
        display: none;
      }

      .managedStaffPanel p {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 600;
        color: #0f172a;
      }

      .radioGroup {
        display: flex;
        gap: 20px;
      }

      .radioGroup label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        font-weight: 400;
        cursor: pointer;
      }

      .radioGroup input[type="radio"] {
        width: auto;
        margin: 0;
        cursor: pointer;
      }

      .radioGroup input[type="checkbox"] {
        width: auto;
        margin: 0;
        cursor: pointer;
      }

      .assessorPanel {
        margin-top: 18px;
        border: 1px solid #d8e3ee;
        border-radius: 12px;
        background: #f8fbff;
        padding: 14px;
        display: none;
      }

      .assessorPanel p {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 600;
        color: #0f172a;
      }

      select {
        width: 100%;
        border: 1px solid #c8d6e3;
        border-radius: 10px;
        font-size: 15px;
        padding: 10px 12px;
        background: #ffffff;
        color: #0f172a;
        box-sizing: border-box;
        appearance: auto;
      }

      select:focus {
        outline: 3px solid rgba(37, 99, 235, 0.2);
        border-color: #2563eb;
      }

      .assessorConfirm {
        margin-top: 12px;
      }

      .assessorDetail {
        margin-top: 12px;
        padding: 12px;
        border-radius: 10px;
        background: #eef4fb;
        border: 1px solid #d8e3ee;
        font-size: 14px;
        line-height: 1.5;
        display: none;
      }

      .emailsPanel {
        margin-top: 18px;
        border: 1px solid #d8e3ee;
        border-radius: 12px;
        background: #f8fbff;
        padding: 14px;
        display: none;
      }

      .emailsPanel p {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 600;
        color: #0f172a;
      }

      .optionDisabled {
        opacity: 0.55;
      }

      .spacedBottom {
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>RPL Emailer V0.2</h1>
      <p class="subtitle">Enter a student Contact ID from Axcelerate and submit to fetch the student details.</p>

      <form id="emailerForm" class="formRow">
        <label for="contactIdInput">Student Contact ID (Axcelerate)</label>
        <input id="contactIdInput" name="contactId" type="text" required autocomplete="off" />

        <div class="actions">
          <button id="submitBtn" class="primary" type="submit">Submit</button>
        </div>
      </form>

      <div id="statusMessage" class="status" aria-live="polite"></div>

      <section id="responsePanel" class="responsePanel">
        <h2>Webhook Response</h2>
        <p>Is this the correct student?</p>
        <div id="responseData" class="studentDetails">No response yet.</div>
        <div class="confirmActions">
          <button id="yesBtn" class="primary" type="button">Yes</button>
          <button class="secondary" type="button">No</button>
        </div>
      </section>

      <section id="qualificationsPanel" class="managedStaffPanel">
        <p>Select qualification / RPL question set</p>
        <select id="qualificationsSelect">
          <option value="">Loading qualifications...</option>
        </select>
        <div id="qualificationDetail" class="assessorDetail"></div>
        <div class="assessorConfirm">
          <button id="qualificationSelectBtn" class="primary" type="button" disabled>Select</button>
        </div>
      </section>

      <section id="managedStaffPanel" class="managedStaffPanel">
        <p>Has the student managed staff?</p>
        <div class="radioGroup">
          <label><input type="radio" name="managedStaff" value="yes" /> Yes</label>
          <label><input type="radio" name="managedStaff" value="no" checked /> No</label>
        </div>
      </section>

      <section id="assessorPanel" class="assessorPanel">
        <p>Select the assigned assessor</p>
        <div class="radioGroup spacedBottom">
          <label><input type="radio" name="assessorAssignment" value="assigned" checked /> Assessor Assigned</label>
          <label><input type="radio" name="assessorAssignment" value="none" /> No Assessor Assigned</label>
        </div>
        <select id="assessorSelect">
          <option value="">Loading assessors…</option>
        </select>
        <div id="assessorDetail" class="assessorDetail"></div>
        <div class="assessorConfirm">
          <button id="assessorConfirmBtn" class="primary" type="button">Confirm</button>
        </div>
      </section>

      <section id="emailsPanel" class="emailsPanel">
        <p>Emails</p>
        <div class="radioGroup">
          <label><input id="studentMailOption" type="checkbox" /> Student</label>
          <label id="assessorMailOptionLabel"><input id="assessorMailOption" type="checkbox" /> Assessor</label>
        </div>
        <div class="assessorConfirm">
          <button id="sendEmailsBtn" class="primary" type="button" disabled>Send Email(s)</button>
        </div>
      </section>
    </main>

    <script>
      const WEBHOOK_URL =
        "https://default63871d3cd05d49fa86b6420054699f.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/6550b2c761904160b0bae9baf9d59d7b/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=tDGXeZGMjeoZqZ3n6UsWXmAph7KPxQhCO29menDswtw";

      const ASSESSORS_WEBHOOK_URL =
        "https://default63871d3cd05d49fa86b6420054699f.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/bcc8d653415344048d5659c08b47bf2c/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=xky-PnLtXZuZ9xc-smRCubKOixhyMaxljXPbT6SXXWQ";

      const QUALIFICATIONS_WEBHOOK_URL =
        "https://default63871d3cd05d49fa86b6420054699f.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/09/workflows/4664fd1c8ec24e5394a965c006249eb6/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=g1Jci80MCPSEZhlU03EgQZFph1NzPQeSNYZwpVuFEBg";

      const SEND_EMAILS_WEBHOOK_URL =
        "https://default63871d3cd05d49fa86b6420054699f.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/30/workflows/4305847cfe4e441f9376fb10ce875be4/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=xRlXZFaq5SNMBsufjaMK2QDapp9_hzAEKPRbStDVpTo";

      let assessorsData = [];
      let qualificationsData = [];
      let selectedRplQuestions = "";

      const assessorSelectEl = document.getElementById("assessorSelect");
      const assessorDetailEl = document.getElementById("assessorDetail");
      const assessorConfirmBtnEl = document.getElementById("assessorConfirmBtn");
      const qualificationsPanelEl = document.getElementById("qualificationsPanel");
      const qualificationsSelectEl = document.getElementById("qualificationsSelect");
      const qualificationDetailEl = document.getElementById("qualificationDetail");
      const qualificationSelectBtnEl = document.getElementById("qualificationSelectBtn");
      const emailsPanelEl = document.getElementById("emailsPanel");
      const studentMailOptionEl = document.getElementById("studentMailOption");
      const assessorMailOptionEl = document.getElementById("assessorMailOption");
      const assessorMailOptionLabelEl = document.getElementById("assessorMailOptionLabel");
      const sendEmailsBtnEl = document.getElementById("sendEmailsBtn");

      const getAssessorAssignmentMode = () => document.querySelector("input[name='assessorAssignment']:checked")?.value || "assigned";

      const getManagedStaffSelection = () => {
        const selected = document.querySelector("input[name='managedStaff']:checked")?.value;
        return selected === "yes" ? "Yes" : "No";
      };

      const updateSendEmailsButtonState = () => {
        sendEmailsBtnEl.disabled = !studentMailOptionEl.checked && !assessorMailOptionEl.checked;
      };

      const updateAssessorMailAvailability = () => {
        const noAssessorAssigned = getAssessorAssignmentMode() === "none";
        assessorMailOptionEl.disabled = noAssessorAssigned;
        assessorMailOptionLabelEl.classList.toggle("optionDisabled", noAssessorAssigned);
        if (noAssessorAssigned) {
          assessorMailOptionEl.checked = false;
        }
        updateSendEmailsButtonState();
      };

      const updateEmailsPanelVisibility = () => {
        const noAssessorAssigned = getAssessorAssignmentMode() === "none";
        const hasAssessorSelection = Boolean(assessorSelectEl.value);
        const shouldShow = noAssessorAssigned || hasAssessorSelection;
        emailsPanelEl.style.display = shouldShow ? "block" : "none";
        if (!shouldShow) {
          studentMailOptionEl.checked = false;
          assessorMailOptionEl.checked = false;
        }
        updateAssessorMailAvailability();
      };

      const loadAssessors = async () => {
        try {
          const res = await fetch(ASSESSORS_WEBHOOK_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({}) });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          assessorsData = Array.isArray(data) ? data : [];
          assessorSelectEl.innerHTML = '<option value="">-- Select an assessor --</option>';
          assessorsData.forEach((a) => {
            const opt = document.createElement("option");
            opt.value = a["ID"];
            opt.textContent = `${a["First Name"]} ${a["Last Name"]}`;
            assessorSelectEl.appendChild(opt);
          });
        } catch (err) {
          assessorSelectEl.innerHTML = '<option value="">Failed to load assessors</option>';
          console.error("Assessor load error:", err);
        }
      };

      const loadQualifications = async () => {
        try {
          const res = await fetch(QUALIFICATIONS_WEBHOOK_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({}) });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          qualificationsData = Array.isArray(data) ? data : Array.isArray(data?.body) ? data.body : [];
          qualificationsSelectEl.innerHTML = '<option value="">-- Select a qualification --</option>';
          qualificationsData.forEach((qualification, index) => {
            const opt = document.createElement("option");
            opt.value = String(index);
            const qualificationsLabel = qualification["QUALIFICATIONS"] || `Qualification ${index + 1}`;
            const rplQuestionsLabel = qualification["RPL Questions"] || "No RPL Questions";
            opt.textContent = `${qualificationsLabel} - ${rplQuestionsLabel}`;
            qualificationsSelectEl.appendChild(opt);
          });
        } catch (err) {
          qualificationsSelectEl.innerHTML = '<option value="">Failed to load qualifications</option>';
          console.error("Qualifications load error:", err);
        }
      };

      assessorSelectEl.addEventListener("change", () => {
        const selected = assessorsData.find((a) => String(a["ID"]) === assessorSelectEl.value);
        if (!selected) {
          assessorDetailEl.style.display = "none";
          assessorDetailEl.innerHTML = "";
          updateEmailsPanelVisibility();
          return;
        }
        assessorDetailEl.innerHTML = [
          `<div class="studentRow"><div class="studentLabel">ID</div><div class="studentValue">${escapeHtml(String(selected["ID"]))}</div></div>`,
          `<div class="studentRow"><div class="studentLabel">First Name</div><div class="studentValue">${escapeHtml(selected["First Name"] || "-")}</div></div>`,
          `<div class="studentRow"><div class="studentLabel">Last Name</div><div class="studentValue">${escapeHtml(selected["Last Name"] || "-")}</div></div>`,
          `<div class="studentRow"><div class="studentLabel">Email</div><div class="studentValue">${escapeHtml(selected["Email"] || "-")}</div></div>`,
          `<div class="studentRow"><div class="studentLabel">Phone</div><div class="studentValue">${escapeHtml(selected["Phone"] || "-")}</div></div>`,
        ].join("");
        assessorDetailEl.style.display = "block";
        updateEmailsPanelVisibility();
      });

      loadAssessors();
      loadQualifications();

      const formEl = document.getElementById("emailerForm");
      const assessorPanelEl = document.getElementById("assessorPanel");
      const managedStaffPanelEl = document.getElementById("managedStaffPanel");
      const yesBtnEl = document.getElementById("yesBtn");
      const managedStaffYesEl = document.querySelector("input[name='managedStaff'][value='yes']");
      const managedStaffNoEl = document.querySelector("input[name='managedStaff'][value='no']");
      const assessorAssignmentAssignedEl = document.querySelector("input[name='assessorAssignment'][value='assigned']");
      const assessorAssignmentNoneEl = document.querySelector("input[name='assessorAssignment'][value='none']");
      const inputEl = document.getElementById("contactIdInput");
      const submitBtnEl = document.getElementById("submitBtn");
      const statusEl = document.getElementById("statusMessage");
      const responsePanelEl = document.getElementById("responsePanel");
      const responseDataEl = document.getElementById("responseData");

      const setStatus = (message, kind) => {
        statusEl.textContent = message;
        statusEl.className = "status";
        if (kind) {
          statusEl.classList.add(kind);
        }
      };

      const resetAssessorAndEmailState = () => {
        selectedRplQuestions = "";
        qualificationsPanelEl.style.display = "none";
        qualificationsSelectEl.value = "";
        qualificationSelectBtnEl.disabled = true;
        qualificationDetailEl.style.display = "none";
        qualificationDetailEl.innerHTML = "";
        managedStaffYesEl.checked = false;
        managedStaffNoEl.checked = true;
        assessorAssignmentAssignedEl.checked = true;
        assessorAssignmentNoneEl.checked = false;
        assessorSelectEl.disabled = false;
        assessorSelectEl.value = "";
        assessorDetailEl.style.display = "none";
        assessorDetailEl.innerHTML = "";
        emailsPanelEl.style.display = "none";
        studentMailOptionEl.checked = false;
        assessorMailOptionEl.checked = false;
        assessorMailOptionEl.disabled = false;
        assessorMailOptionLabelEl.classList.remove("optionDisabled");
        updateSendEmailsButtonState();
      };

      yesBtnEl.addEventListener("click", () => {
        resetAssessorAndEmailState();
        qualificationsPanelEl.style.display = "block";
        managedStaffPanelEl.style.display = "none";
        assessorPanelEl.style.display = "none";
        qualificationsPanelEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
      });

      qualificationsSelectEl.addEventListener("change", () => {
        const hasSelection = qualificationsSelectEl.value !== "";
        qualificationSelectBtnEl.disabled = !hasSelection;
        if (!hasSelection) {
          qualificationDetailEl.style.display = "none";
          qualificationDetailEl.innerHTML = "";
          return;
        }
        const selected = qualificationsData[Number(qualificationsSelectEl.value)] || {};
        qualificationDetailEl.innerHTML = [
          `<div class="studentRow"><div class="studentLabel">QUALIFICATIONS</div><div class="studentValue">${escapeHtml(selected["QUALIFICATIONS"] || "-")}</div></div>`,
          `<div class="studentRow"><div class="studentLabel">RPL Questions</div><div class="studentValue">${escapeHtml(selected["RPL Questions"] || "-")}</div></div>`,
          `<div class="studentRow"><div class="studentLabel">DOMAIN</div><div class="studentValue">${escapeHtml(selected["DOMAIN"] || "-")}</div></div>`,
          `<div class="studentRow"><div class="studentLabel">Notes</div><div class="studentValue">${escapeHtml(selected["Notes"] || "-")}</div></div>`,
        ].join("");
        qualificationDetailEl.style.display = "block";
      });

      qualificationSelectBtnEl.addEventListener("click", () => {
        if (qualificationsSelectEl.value === "") {
          setStatus("Please select a qualification row.", "error");
          return;
        }
        const selected = qualificationsData[Number(qualificationsSelectEl.value)] || {};
        selectedRplQuestions = String(selected["RPL Questions"] || "").trim();
        if (!selectedRplQuestions) {
          setStatus("Selected qualification row has no RPL Questions value.", "error");
          return;
        }
        managedStaffPanelEl.style.display = "block";
        managedStaffPanelEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
      });

      managedStaffPanelEl.addEventListener("change", (e) => {
        if (e.target.name === "managedStaff") {
          assessorPanelEl.style.display = "block";
          assessorPanelEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }
      });

      assessorPanelEl.addEventListener("change", (e) => {
        if (e.target.name !== "assessorAssignment") {
          return;
        }
        const noAssessorAssigned = getAssessorAssignmentMode() === "none";
        assessorSelectEl.disabled = noAssessorAssigned;
        if (noAssessorAssigned) {
          assessorSelectEl.value = "";
          assessorDetailEl.style.display = "none";
          assessorDetailEl.innerHTML = "";
        }
        updateEmailsPanelVisibility();
      });

      assessorConfirmBtnEl.addEventListener("click", () => {
        const noAssessorAssigned = getAssessorAssignmentMode() === "none";
        if (!noAssessorAssigned && !assessorSelectEl.value) {
          setStatus("Please select an assessor, or choose No Assessor Assigned.", "error");
          return;
        }
        updateEmailsPanelVisibility();
        emailsPanelEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
      });

      studentMailOptionEl.addEventListener("change", updateSendEmailsButtonState);
      assessorMailOptionEl.addEventListener("change", updateSendEmailsButtonState);

      sendEmailsBtnEl.addEventListener("click", async () => {
        if (!selectedRplQuestions) {
          setStatus("Please select a qualification row first.", "error");
          return;
        }
        const payload = {
          ContactID: inputEl.value.trim(),
          rplQuestions: selectedRplQuestions,
          ManagedStaff: getManagedStaffSelection(),
          StudentMail: studentMailOptionEl.checked ? "Yes" : "No",
          AssessorMail: assessorMailOptionEl.checked ? "Yes" : "No",
        };

        sendEmailsBtnEl.disabled = true;
        setStatus("Sending email request...", "");

        try {
          const response = await fetch(SEND_EMAILS_WEBHOOK_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          setStatus("Email request sent.", "success");
        } catch (error) {
          console.error("Send email webhook error:", error);
          setStatus("Unable to send email request.", "error");
        } finally {
          updateSendEmailsButtonState();
        }
      });

      const escapeHtml = (value) =>
        String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");

      const renderStudentField = (label, value) => {
        const safeValue = value === null || value === undefined || value === "" ? "-" : String(value);
        return [
          '<div class="studentRow">',
          `  <div class="studentLabel">${escapeHtml(label)}</div>`,
          `  <div class="studentValue">${escapeHtml(safeValue)}</div>`,
          "</div>",
        ].join("\n");
      };

      const showResponse = (data) => {
        const source = data && typeof data === "object" ? data : {};
        const givenName = source.student_given_name || "";
        const surname = source.student_surname || "";
        const fullName = `${String(givenName).trim()} ${String(surname).trim()}`.trim();

        responseDataEl.innerHTML = [
          renderStudentField("Name", fullName),
          renderStudentField("Contact ID", source.contact_id),
          renderStudentField("Email", source.email),
          renderStudentField("Mobile", source.mobile),
        ].join("\n");

        responsePanelEl.style.display = "block";
      };

      formEl.addEventListener("submit", async (event) => {
        event.preventDefault();

        const contactId = inputEl.value.trim();
        if (!contactId) {
          setStatus("Please enter a Contact ID.", "error");
          responsePanelEl.style.display = "none";
          return;
        }

        submitBtnEl.disabled = true;
        setStatus("Submitting Contact ID...", "");
        responsePanelEl.style.display = "none";
        managedStaffPanelEl.style.display = "none";
        assessorPanelEl.style.display = "none";
        resetAssessorAndEmailState();

        try {
          const response = await fetch(WEBHOOK_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              ContactID: contactId,
            }),
          });

          const responseText = await response.text();
          let parsed;

          try {
            parsed = responseText ? JSON.parse(responseText) : { message: "No response body." };
          } catch {
            parsed = { message: responseText || "No response body." };
          }

          if (!response.ok) {
            setStatus("Webhook call failed.", "error");
            showResponse({
              status: response.status,
              statusText: response.statusText,
              data: parsed,
            });
            return;
          }

          setStatus("Student data received.", "success");
          showResponse(parsed);
        } catch (error) {
          setStatus("Unable to call the webhook. Check network/CORS settings.", "error");
          showResponse({ error: String(error) });
        } finally {
          submitBtnEl.disabled = false;
        }
      });
    </script>
  </body>
</html>
