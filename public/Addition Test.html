<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Addition Test</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f3f7fb;
        color: #0f172a;
      }

      body {
        display: grid;
        place-items: start center;
        padding: 24px;
        gap: 24px;
      }

      .card {
        width: min(960px, 100%);
        background: #ffffff;
        border: 1px solid #d8e3ee;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        font-weight: 700;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 18px;
        font-weight: 700;
        color: #0f172a;
      }

      .subtitle {
        margin: 0 0 20px;
        color: #475569;
        font-size: 14px;
        line-height: 1.5;
      }

      .section {
        margin-top: 28px;
      }

      .section:first-of-type {
        margin-top: 0;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .badge {
        font-size: 12px;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 20px;
        background: #eef4fb;
        border: 1px solid #d8e3ee;
        color: #1e40af;
      }

      .status {
        font-size: 13px;
        color: #475569;
        margin-bottom: 10px;
        min-height: 18px;
      }

      .status.error {
        color: #b91c1c;
      }

      .status.success {
        color: #166534;
      }

      .table-wrapper {
        overflow-x: auto;
        border: 1px solid #d8e3ee;
        border-radius: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      thead {
        background: #eef4fb;
      }

      thead th {
        padding: 10px 14px;
        text-align: left;
        font-weight: 700;
        color: #1e293b;
        border-bottom: 1px solid #d8e3ee;
        white-space: nowrap;
      }

      tbody tr {
        border-bottom: 1px solid #e9f0f8;
      }

      tbody tr:last-child {
        border-bottom: none;
      }

      tbody tr:hover {
        background: #f8fbff;
      }

      tbody td {
        padding: 10px 14px;
        color: #334155;
        word-break: break-word;
      }

      .radio-cell {
        width: 36px;
        text-align: center;
        padding: 10px 8px;
      }

      .radio-cell input[type="radio"] {
        width: 16px;
        height: 16px;
        accent-color: #2563eb;
        cursor: pointer;
        margin: 0;
      }

      tbody tr.selected-row {
        background: #eef4fb;
      }

      .html-cell {
        max-width: 480px;
        font-size: 13px;
        line-height: 1.5;
      }

      .empty-row td {
        color: #94a3b8;
        font-style: italic;
        text-align: center;
        padding: 20px;
      }

      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid #d8e3ee;
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      button {
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .primary {
        background: #2563eb;
        color: #ffffff;
      }

      .primary:hover {
        background: #1d4ed8;
      }

      .secondary {
        background: #ffffff;
        border-color: #c8d6e3;
        color: #0f172a;
      }

      .secondary:hover {
        background: #f0f6ff;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .formRow {
        display: grid;
        gap: 10px;
      }

      label {
        font-size: 14px;
        font-weight: 600;
      }

      input[type="text"] {
        width: 100%;
        border: 1px solid #c8d6e3;
        border-radius: 10px;
        font-size: 16px;
        padding: 12px;
        box-sizing: border-box;
      }

      input[type="text"]:focus {
        outline: 3px solid rgba(37, 99, 235, 0.2);
        border-color: #2563eb;
      }

      .form-actions {
        margin-top: 8px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .student-banner {
        margin-top: 12px;
        padding: 10px 14px;
        border-radius: 10px;
        background: #eef4fb;
        border: 1px solid #d8e3ee;
        font-size: 14px;
        font-weight: 600;
        color: #1e293b;
        display: none;
      }

      .section-divider {
        border: none;
        border-top: 1px solid #e9f0f8;
        margin: 24px 0 4px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Addition Test</h1>
      <p class="subtitle">Enter a Student Contact ID to populate name fields in email templates. Qualification and template data loads automatically.</p>

      <!-- Student Lookup -->
      <div class="section" style="margin-top: 0;">
        <h2>Student Lookup</h2>
        <form id="studentForm" class="formRow">
          <label for="contactIdInput">Student Contact ID (Axcelerate)</label>
          <input id="contactIdInput" name="contactId" type="text" required autocomplete="off" />
          <div class="form-actions">
            <button id="submitBtn" class="primary" type="submit">Submit</button>
          </div>
        </form>
        <div id="studentStatus" class="status" aria-live="polite"></div>
        <div id="studentBanner" class="student-banner"></div>
      </div>

      <hr class="section-divider" />

      <!-- Qualifications -->
      <div class="section">
        <div class="section-header">
          <h2>Qualifications</h2>
          <button class="secondary" id="reloadQualBtn" type="button">Reload</button>
        </div>
        <div id="qualStatus" class="status"></div>
        <div class="table-wrapper">
          <table id="qualTable">
            <thead id="qualThead"><tr><th>Loading…</th></tr></thead>
            <tbody id="qualTbody">
              <tr class="empty-row"><td>Fetching data…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Email Templates -->
      <div class="section">
        <div class="section-header">
          <h2>Email Templates</h2>
          <button class="secondary" id="reloadTplBtn" type="button">Reload</button>
        </div>
        <div id="tplStatus" class="status"></div>
        <div class="table-wrapper">
          <table id="tplTable">
            <thead id="tplThead"><tr><th>Loading…</th></tr></thead>
            <tbody id="tplTbody">
              <tr class="empty-row"><td>Fetching data…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <script>
      const STUDENT_URL =
        "https://default63871d3cd05d49fa86b6420054699f.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/6550b2c761904160b0bae9baf9d59d7b/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=tDGXeZGMjeoZqZ3n6UsWXmAph7KPxQhCO29menDswtw";

      const QUALIFICATIONS_URL =
        "https://default63871d3cd05d49fa86b6420054699f.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a61b9bade4034a2289f85f64d4c82f97/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=JPj39E9PXnhppfpFdo1QZeWuADa7dfgKna3C-x2v7kg";

      const EMAIL_TEMPLATES_URL =
        "https://default63871d3cd05d49fa86b6420054699f.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/1a57326e40994b8d9bad3cab1276c92f/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=gFQWaYM_SDJM2e2aNNfJzcRgEgjv2Z2PuLzWngUaGeg";

      const escapeHtml = (value) => {
        if (value === null || value === undefined) return "-";
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      };

      const setStatus = (el, message, kind) => {
        el.innerHTML = message;
        el.className = "status";
        if (kind) el.classList.add(kind);
      };

      const HTML_COLUMNS = new Set(["Email Contents"]);
  let emailTemplatesData = [];
  let studentName = "";

  const HTML_COLUMNS = new Set(["Email Contents"]);

      const renderTable = (theadEl, tbodyEl, rows, { radioSelect = false, nameSubstitute = "" } = {}) => {
        if (!Array.isArray(rows) || rows.length === 0) {
          theadEl.innerHTML = "<tr><th>No data</th></tr>";
          tbodyEl.innerHTML = '<tr class="empty-row"><td>No records returned.</td></tr>';
          return;
        }

        // Derive columns from the union of all keys across all rows
        const keys = Array.from(new Set(rows.flatMap((r) => Object.keys(r))));

        const radioHeader = radioSelect ? '<th class="radio-cell"></th>' : "";
        theadEl.innerHTML =
          "<tr>" + radioHeader + keys.map((k) => `<th>${escapeHtml(k)}</th>`).join("") + "</tr>";

        tbodyEl.innerHTML = rows
          .map((row, i) => {
            const radioCell = radioSelect
              ? `<td class="radio-cell"><input type="radio" name="qual_select" value="${i}" aria-label="Select row ${i + 1}" /></td>`
              : "";
            const cells = keys
              .map((k) => {
                if (HTML_COLUMNS.has(k)) {
                  let cellHtml = row[k] ?? "";
                  if (nameSubstitute) {
                    cellHtml = cellHtml.replace(/\[Name\]/g, escapeHtml(nameSubstitute));
                  }
                  return `<td class="html-cell">${cellHtml}</td>`;
                }
                return `<td>${escapeHtml(row[k])}</td>`;
              })
              .join("");
            return `<tr>${radioCell}${cells}</tr>`;
          })
          .join("");

        if (radioSelect) {
          tbodyEl.querySelectorAll('input[type="radio"]').forEach((radio) => {
            radio.addEventListener("change", () => {
              tbodyEl.querySelectorAll("tr").forEach((tr) => tr.classList.remove("selected-row"));
              radio.closest("tr").classList.add("selected-row");
            });
          });
        }
      };

      const fetchAndRender = async (url, theadEl, tbodyEl, statusEl, reloadBtn, options = {}) => {
        reloadBtn.disabled = true;
        setStatus(statusEl, '<span class="spinner"></span>Loading…', "");
        theadEl.innerHTML = "<tr><th>Loading…</th></tr>";
        tbodyEl.innerHTML = '<tr class="empty-row"><td>Fetching data…</td></tr>';

        try {
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({}),
          });

          if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);

          const data = await res.json();
          const rows = Array.isArray(data) ? data : [data];

          renderTable(theadEl, tbodyEl, rows, options);
          setStatus(statusEl, `${rows.length} record${rows.length !== 1 ? "s" : ""} loaded.`, "success");
        } catch (err) {
          theadEl.innerHTML = "<tr><th>Error</th></tr>";
          tbodyEl.innerHTML = `<tr class="empty-row"><td>${escapeHtml(err.message)}</td></tr>`;
          setStatus(statusEl, `Failed to load data: ${escapeHtml(err.message)}`, "error");
          console.error(err);
        } finally {
          reloadBtn.disabled = false;
        }
      };

      const qualThead = document.getElementById("qualThead");
      const qualTbody = document.getElementById("qualTbody");
      const qualStatus = document.getElementById("qualStatus");
      const reloadQualBtn = document.getElementById("reloadQualBtn");

      const tplThead = document.getElementById("tplThead");
      const tplTbody = document.getElementById("tplTbody");
      const tplStatus = document.getElementById("tplStatus");
      const reloadTplBtn = document.getElementById("reloadTplBtn");

      const loadQualifications = () =>
        fetchAndRender(QUALIFICATIONS_URL, qualThead, qualTbody, qualStatus, reloadQualBtn, { radioSelect: true });

      const renderEmailTemplates = () => {
        renderTable(tplThead, tplTbody, emailTemplatesData, { nameSubstitute: studentName });
        const count = emailTemplatesData.length;
        const suffix = studentName ? ` — [Name] replaced with "${escapeHtml(studentName)}"` : "";
        setStatus(tplStatus, `${count} record${count !== 1 ? "s" : ""} loaded${suffix}.`, "success");
      };

      const loadEmailTemplates = async () => {
        reloadTplBtn.disabled = true;
        setStatus(tplStatus, '<span class="spinner"></span>Loading…', "");
        tplThead.innerHTML = "<tr><th>Loading…</th></tr>";
        tplTbody.innerHTML = '<tr class="empty-row"><td>Fetching data…</td></tr>';
        try {
          const res = await fetch(EMAIL_TEMPLATES_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({}),
          });
          if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
          const data = await res.json();
          emailTemplatesData = Array.isArray(data) ? data : [data];
          renderEmailTemplates();
        } catch (err) {
          tplThead.innerHTML = "<tr><th>Error</th></tr>";
          tplTbody.innerHTML = `<tr class="empty-row"><td>${escapeHtml(err.message)}</td></tr>`;
          setStatus(tplStatus, `Failed to load data: ${escapeHtml(err.message)}`, "error");
          console.error(err);
        } finally {
          reloadTplBtn.disabled = false;
        }
      };

      reloadQualBtn.addEventListener("click", loadQualifications);
      reloadTplBtn.addEventListener("click", loadEmailTemplates);

      document.getElementById("studentForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const contactId = document.getElementById("contactIdInput").value.trim();
        if (!contactId) return;

        const submitBtn = document.getElementById("submitBtn");
        const studentStatusEl = document.getElementById("studentStatus");
        const studentBanner = document.getElementById("studentBanner");

        submitBtn.disabled = true;
        setStatus(studentStatusEl, '<span class="spinner"></span>Looking up student…', "");
        studentBanner.style.display = "none";

        try {
          const res = await fetch(STUDENT_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contact_id: contactId }),
          });
          if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
          const data = await res.json();
          const src = data && typeof data === "object" ? data : {};
          const given = String(src.student_given_name || "").trim();
          const surname = String(src.student_surname || "").trim();
          studentName = `${given} ${surname}`.trim();

          if (studentName) {
            studentBanner.textContent = `Student: ${studentName}`;
            studentBanner.style.display = "block";
            setStatus(studentStatusEl, "Student found.", "success");
          } else {
            studentBanner.style.display = "none";
            setStatus(studentStatusEl, "No student name returned.", "error");
          }

          if (emailTemplatesData.length > 0) {
            renderEmailTemplates();
          }
        } catch (err) {
          setStatus(studentStatusEl, `Failed to look up student: ${escapeHtml(err.message)}`, "error");
          console.error(err);
        } finally {
          submitBtn.disabled = false;
        }
      });

      // Load both on page load
      loadQualifications();
      loadEmailTemplates();
    </script>
  </body>
</html>
