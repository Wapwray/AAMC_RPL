<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Addition Test</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f3f7fb;
        color: #0f172a;
      }

      body {
        display: grid;
        place-items: start center;
        padding: 24px;
        gap: 24px;
      }

      .card {
        width: min(960px, 100%);
        background: #ffffff;
        border: 1px solid #d8e3ee;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        font-weight: 700;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 18px;
        font-weight: 700;
        color: #0f172a;
      }

      .subtitle {
        margin: 0 0 20px;
        color: #475569;
        font-size: 14px;
        line-height: 1.5;
      }

      .formRow {
        display: grid;
        gap: 10px;
      }

      label {
        font-size: 14px;
        font-weight: 600;
      }

      input[type="text"] {
        width: 100%;
        border: 1px solid #c8d6e3;
        border-radius: 10px;
        font-size: 16px;
        padding: 12px;
        box-sizing: border-box;
      }

      input[type="text"]:focus {
        outline: 3px solid rgba(37, 99, 235, 0.2);
        border-color: #2563eb;
      }

      .actions {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .section {
        margin-top: 28px;
      }

      .assessorPanel {
        margin-top: 18px;
        border: 1px solid #d8e3ee;
        border-radius: 12px;
        background: #f8fbff;
        padding: 14px;
      }

      .assessorPanel p {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 600;
        color: #0f172a;
      }

      .radioGroup {
        display: flex;
        gap: 20px;
      }

      .radioGroup label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        font-weight: 400;
        cursor: pointer;
      }

      .radioGroup input[type="radio"] {
        width: auto;
        margin: 0;
        cursor: pointer;
      }

      .spacedBottom {
        margin-bottom: 12px;
      }

      select {
        width: 100%;
        border: 1px solid #c8d6e3;
        border-radius: 10px;
        font-size: 15px;
        padding: 10px 12px;
        background: #ffffff;
        color: #0f172a;
        box-sizing: border-box;
        appearance: auto;
      }

      select:focus {
        outline: 3px solid rgba(37, 99, 235, 0.2);
        border-color: #2563eb;
      }

      .assessorConfirm {
        margin-top: 12px;
      }

      .assessorDetail {
        margin-top: 12px;
        padding: 12px;
        border-radius: 10px;
        background: #eef4fb;
        border: 1px solid #d8e3ee;
        font-size: 14px;
        line-height: 1.5;
        display: none;
      }

      .studentRow {
        display: grid;
        grid-template-columns: 130px 1fr;
        gap: 8px;
        padding: 4px 0;
      }

      .studentLabel {
        font-weight: 700;
        color: #1e293b;
      }

      .studentValue {
        color: #0f172a;
        word-break: break-word;
      }

      .dateTimeGrid {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      input[type="date"],
      input[type="time"] {
        width: 100%;
        border: 1px solid #c8d6e3;
        border-radius: 10px;
        font-size: 15px;
        padding: 10px 12px;
        background: #ffffff;
        color: #0f172a;
        box-sizing: border-box;
      }

      input[type="date"]:focus,
      input[type="time"]:focus {
        outline: 3px solid rgba(37, 99, 235, 0.2);
        border-color: #2563eb;
      }

      .section:first-of-type {
        margin-top: 0;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .badge {
        font-size: 12px;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 20px;
        background: #eef4fb;
        border: 1px solid #d8e3ee;
        color: #1e40af;
      }

      .status {
        font-size: 13px;
        color: #475569;
        margin-bottom: 10px;
        min-height: 18px;
      }

      .status.error {
        color: #b91c1c;
      }

      .status.success {
        color: #166534;
      }

      .table-wrapper {
        overflow-x: auto;
        border: 1px solid #d8e3ee;
        border-radius: 12px;
      }

      .section-actions {
        margin-top: 12px;
        display: flex;
        justify-content: flex-end;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      thead {
        background: #eef4fb;
      }

      thead th {
        padding: 10px 14px;
        text-align: left;
        font-weight: 700;
        color: #1e293b;
        border-bottom: 1px solid #d8e3ee;
        white-space: nowrap;
      }

      tbody tr {
        border-bottom: 1px solid #e9f0f8;
      }

      tbody tr:last-child {
        border-bottom: none;
      }

      tbody tr:hover {
        background: #f8fbff;
      }

      tbody td {
        padding: 10px 14px;
        color: #334155;
        word-break: break-word;
      }

      .radio-cell {
        width: 36px;
        text-align: center;
        padding: 10px 8px;
      }

      .radio-cell input[type="radio"] {
        width: 16px;
        height: 16px;
        accent-color: #2563eb;
        cursor: pointer;
        margin: 0;
      }

      tbody tr.selected-row {
        background: #eef4fb;
      }

      .html-cell {
        max-width: 480px;
        font-size: 13px;
        line-height: 1.5;
      }

      .email-type-cell {
        text-align: left;
        vertical-align: top;
        font-weight: 700;
        text-decoration: underline;
      }

      .empty-row td {
        color: #94a3b8;
        font-style: italic;
        text-align: center;
        padding: 20px;
      }

      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid #d8e3ee;
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      button {
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .primary {
        background: #2563eb;
        color: #ffffff;
      }

      .primary:hover {
        background: #1d4ed8;
      }

      .secondary {
        background: #ffffff;
        border-color: #c8d6e3;
        color: #0f172a;
      }

      .secondary:hover {
        background: #f0f6ff;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Addition Test</h1>
      <p class="subtitle">Enter a student Contact ID, then load Qualifications and Email Templates. [Name] in templates is replaced with the selected student name.</p>

      <form id="studentForm" class="formRow">
        <label for="contactIdInput">Student Contact ID (Axcelerate)</label>
        <input id="contactIdInput" name="contactId" type="text" required autocomplete="off" />

        <div class="actions">
          <button id="submitBtn" class="primary" type="submit">Submit</button>
        </div>
      </form>

      <div id="studentStatus" class="status" aria-live="polite"></div>

      <section id="assessorPanel" class="assessorPanel">
        <p>Select the assigned assessor</p>
        <div class="radioGroup spacedBottom">
          <label><input type="radio" name="assessorAssignment" value="assigned" checked /> Assessor Assigned</label>
          <label><input type="radio" name="assessorAssignment" value="none" /> No Assessor Assigned</label>
        </div>
        <select id="assessorSelect" aria-label="Select assessor">
          <option value="">Loading assessors...</option>
        </select>
        <div id="assessorDetail" class="assessorDetail"></div>
        <div class="assessorConfirm">
          <button id="assessorConfirmBtn" class="primary" type="button">Confirm</button>
        </div>
        <div class="dateTimeGrid">
          <div>
            <label for="assessmentDate">Assessment Date</label>
            <input id="assessmentDate" type="date" />
          </div>
          <div>
            <label for="assessmentTime">Assessment Time</label>
            <input id="assessmentTime" type="time" />
          </div>
        </div>
      </section>

      <!-- Qualifications -->
      <div class="section">
        <div class="section-header">
          <h2>Qualifications</h2>
          <button class="secondary" id="reloadQualBtn" type="button">Reload</button>
        </div>
        <div id="qualStatus" class="status"></div>
        <div class="table-wrapper">
          <table id="qualTable">
            <thead id="qualThead"><tr><th>Loading…</th></tr></thead>
            <tbody id="qualTbody">
              <tr class="empty-row"><td>Fetching data…</td></tr>
            </tbody>
          </table>
        </div>
        <div class="section-actions">
          <button class="primary" id="updateEmailBtn" type="button" disabled>Update Email</button>
        </div>
      </div>

      <!-- Email Templates -->
      <div class="section">
        <div class="section-header">
          <h2>Email Templates</h2>
          <button class="secondary" id="reloadTplBtn" type="button">Reload</button>
        </div>
        <div id="tplStatus" class="status"></div>
        <div class="table-wrapper">
          <table id="tplTable">
            <thead id="tplThead"><tr><th>Loading…</th></tr></thead>
            <tbody id="tplTbody">
              <tr class="empty-row"><td>Fetching data…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <script>
      const STUDENT_WEBHOOK_URL =
        "https://default63871d3cd05d49fa86b6420054699f.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/6550b2c761904160b0bae9baf9d59d7b/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=tDGXeZGMjeoZqZ3n6UsWXmAph7KPxQhCO29menDswtw";

      const QUALIFICATIONS_URL =
        "https://default63871d3cd05d49fa86b6420054699f.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a61b9bade4034a2289f85f64d4c82f97/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=JPj39E9PXnhppfpFdo1QZeWuADa7dfgKna3C-x2v7kg";

      const ASSESSORS_WEBHOOK_URL =
        "https://default63871d3cd05d49fa86b6420054699f.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/bcc8d653415344048d5659c08b47bf2c/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=xky-PnLtXZuZ9xc-smRCubKOixhyMaxljXPbT6SXXWQ";

      const EMAIL_TEMPLATES_URL =
        "https://default63871d3cd05d49fa86b6420054699f.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/1a57326e40994b8d9bad3cab1276c92f/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=gFQWaYM_SDJM2e2aNNfJzcRgEgjv2Z2PuLzWngUaGeg";

      const escapeHtml = (value) => {
        if (value === null || value === undefined) return "-";
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      };

      const setStatus = (el, message, kind) => {
        el.innerHTML = message;
        el.className = "status";
        if (kind) el.classList.add(kind);
      };

      const HTML_COLUMNS = new Set(["Email Contents"]);
      const NAME_PLACEHOLDER_REGEX = /\[Name\]/g;
      const QUALIFICATION_PLACEHOLDER_REGEX = /\[Qualification\]/g;
      const ASSESSOR_PLACEHOLDER_REGEX = /\[Assessor\]/g;
      const DATE_PLACEHOLDER_REGEX = /\[Date\]/g;
      const TIME_PLACEHOLDER_REGEX = /\[Time\]/g;
      const STUDENT_ID_PLACEHOLDER_REGEX = /\[Student ID\]/g;

      let currentStudentName = "";
      let currentStudentContactId = "";
      let currentQualificationTitle = "";
      let currentAssessorName = "";
      let assessorsData = [];

      const getStudentNameFromPayload = (source) => {
        if (!source || typeof source !== "object") {
          return "";
        }

        const directFullName = String(source.full_name || source.FullName || source.name || "").trim();
        if (directFullName) {
          return directFullName;
        }

        const givenName = String(source.student_given_name || source.given_name || source.first_name || source["First Name"] || "").trim();
        const surname = String(source.student_surname || source.surname || source.last_name || source["Last Name"] || "").trim();
        return `${givenName} ${surname}`.trim();
      };

      const applyStudentNamePlaceholders = (value) => {
        const replacementName = escapeHtml(currentStudentName || "[Name]");
        return String(value ?? "").replace(NAME_PLACEHOLDER_REGEX, replacementName);
      };

      const applyTemplatePlaceholders = (value) => {
        const withName = applyStudentNamePlaceholders(value);
        const replacementQualification = escapeHtml(currentQualificationTitle || "[Qualification]");
        const withQualification = withName.replace(QUALIFICATION_PLACEHOLDER_REGEX, replacementQualification);
        const withAssessor = withQualification.replace(
          ASSESSOR_PLACEHOLDER_REGEX,
          escapeHtml(currentAssessorName || "[Assessor]")
        );

        const selectedDate = assessmentDateEl.value;
        const selectedTime = assessmentTimeEl.value;
        const formattedDate = selectedDate
          ? new Date(`${selectedDate}T00:00:00`).toLocaleDateString("en-AU", {
              day: "2-digit",
              month: "2-digit",
              year: "numeric",
            })
          : "[Date]";
        const formattedTime = selectedTime || "[Time]";

        return withAssessor
          .replace(DATE_PLACEHOLDER_REGEX, escapeHtml(formattedDate))
          .replace(TIME_PLACEHOLDER_REGEX, escapeHtml(formattedTime))
          .replace(STUDENT_ID_PLACEHOLDER_REGEX, escapeHtml(currentStudentContactId || "[Student ID]"));
      };

      const getQualificationTitleFromRow = (row) => {
        if (!row || typeof row !== "object") {
          return "";
        }

        return String(
          row["Qualification Title"] ||
            row.qualification_title ||
            row.QualificationTitle ||
            row.qualificationTitle ||
            row.title ||
            ""
        ).trim();
      };

      const renderTable = (theadEl, tbodyEl, rows, { radioSelect = false, mapRow, onRadioChange } = {}) => {
        if (!Array.isArray(rows) || rows.length === 0) {
          theadEl.innerHTML = "<tr><th>No data</th></tr>";
          tbodyEl.innerHTML = '<tr class="empty-row"><td>No records returned.</td></tr>';
          return;
        }

        const renderedRows = typeof mapRow === "function" ? rows.map(mapRow) : rows;

        // Derive columns from the union of all keys across all rows
        const keys = Array.from(new Set(renderedRows.flatMap((r) => Object.keys(r))));

        const radioHeader = radioSelect ? '<th class="radio-cell"></th>' : "";
        theadEl.innerHTML =
          "<tr>" + radioHeader + keys.map((k) => `<th>${escapeHtml(k)}</th>`).join("") + "</tr>";

        tbodyEl.innerHTML = renderedRows
          .map((row, i) => {
            const radioCell = radioSelect
              ? `<td class="radio-cell"><input type="radio" name="qual_select" value="${i}" aria-label="Select row ${i + 1}" /></td>`
              : "";
            const cells = keys
              .map((k) => {
                if (HTML_COLUMNS.has(k)) {
                  return `<td class="html-cell">${row[k] ?? ""}</td>`;
                }
                if (k === "Email Type") {
                  return `<td class="email-type-cell">${escapeHtml(row[k])}</td>`;
                }
                return `<td>${escapeHtml(row[k])}</td>`;
              })
              .join("");
            return `<tr>${radioCell}${cells}</tr>`;
          })
          .join("");

        if (radioSelect) {
          tbodyEl.querySelectorAll('input[type="radio"]').forEach((radio) => {
            radio.addEventListener("change", () => {
              tbodyEl.querySelectorAll("tr").forEach((tr) => tr.classList.remove("selected-row"));
              radio.closest("tr").classList.add("selected-row");
              const selectedIndex = Number(radio.value);
              if (typeof onRadioChange === "function") {
                onRadioChange(selectedIndex, renderedRows[selectedIndex]);
              }
            });
          });
        }
      };

      const fetchAndRender = async (url, theadEl, tbodyEl, statusEl, reloadBtn, options = {}) => {
        reloadBtn.disabled = true;
        setStatus(statusEl, '<span class="spinner"></span>Loading…', "");
        theadEl.innerHTML = "<tr><th>Loading…</th></tr>";
        tbodyEl.innerHTML = '<tr class="empty-row"><td>Fetching data…</td></tr>';

        try {
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({}),
          });

          if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);

          const data = await res.json();
          const rows = Array.isArray(data) ? data : [data];

          renderTable(theadEl, tbodyEl, rows, options);
          setStatus(statusEl, `${rows.length} record${rows.length !== 1 ? "s" : ""} loaded.`, "success");
        } catch (err) {
          theadEl.innerHTML = "<tr><th>Error</th></tr>";
          tbodyEl.innerHTML = `<tr class="empty-row"><td>${escapeHtml(err.message)}</td></tr>`;
          setStatus(statusEl, `Failed to load data: ${escapeHtml(err.message)}`, "error");
          console.error(err);
        } finally {
          reloadBtn.disabled = false;
        }
      };

      const qualThead = document.getElementById("qualThead");
      const qualTbody = document.getElementById("qualTbody");
      const qualStatus = document.getElementById("qualStatus");
      const reloadQualBtn = document.getElementById("reloadQualBtn");

      const studentFormEl = document.getElementById("studentForm");
      const contactIdInputEl = document.getElementById("contactIdInput");
      const submitBtnEl = document.getElementById("submitBtn");
      const studentStatusEl = document.getElementById("studentStatus");
      const updateEmailBtnEl = document.getElementById("updateEmailBtn");
      const assessorSelectEl = document.getElementById("assessorSelect");
      const assessorDetailEl = document.getElementById("assessorDetail");
      const assessorConfirmBtnEl = document.getElementById("assessorConfirmBtn");
      const assessorPanelEl = document.getElementById("assessorPanel");
      const assessorAssignmentAssignedEl = document.querySelector("input[name='assessorAssignment'][value='assigned']");
      const assessorAssignmentNoneEl = document.querySelector("input[name='assessorAssignment'][value='none']");
      const assessmentDateEl = document.getElementById("assessmentDate");
      const assessmentTimeEl = document.getElementById("assessmentTime");

      const tplThead = document.getElementById("tplThead");
      const tplTbody = document.getElementById("tplTbody");
      const tplStatus = document.getElementById("tplStatus");
      const reloadTplBtn = document.getElementById("reloadTplBtn");

      const updateUpdateEmailButtonState = () => {
        const hasDateTime = Boolean(assessmentDateEl.value && assessmentTimeEl.value);
        updateEmailBtnEl.disabled = !(currentStudentName && currentQualificationTitle && currentAssessorName && hasDateTime);
      };

      const loadAssessors = async () => {
        try {
          const res = await fetch(ASSESSORS_WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({}),
          });

          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }

          const data = await res.json();
          assessorsData = Array.isArray(data) ? data : [];
          assessorSelectEl.innerHTML = '<option value="">-- Select an assessor --</option>';
          assessorsData.forEach((assessor) => {
            const opt = document.createElement("option");
            opt.value = String(assessor.ID || "");
            opt.textContent = `${assessor["First Name"] || ""} ${assessor["Last Name"] || ""}`.trim() || "Unnamed Assessor";
            assessorSelectEl.appendChild(opt);
          });
        } catch (error) {
          assessorSelectEl.innerHTML = '<option value="">Failed to load assessors</option>';
          console.error("Assessor load error:", error);
        }
      };

      const getAssessorAssignmentMode = () =>
        document.querySelector("input[name='assessorAssignment']:checked")?.value || "assigned";

      const loadQualifications = () =>
        fetchAndRender(QUALIFICATIONS_URL, qualThead, qualTbody, qualStatus, reloadQualBtn, {
          radioSelect: true,
          onRadioChange: (_index, row) => {
            currentQualificationTitle = getQualificationTitleFromRow(row);
            updateUpdateEmailButtonState();
          },
        });

      const loadEmailTemplates = () =>
        fetchAndRender(EMAIL_TEMPLATES_URL, tplThead, tplTbody, tplStatus, reloadTplBtn, {
          mapRow: (row) => {
            if (!row || typeof row !== "object") {
              return row;
            }

            const copy = { ...row };
            if (Object.prototype.hasOwnProperty.call(copy, "Email Contents")) {
              copy["Email Contents"] = applyTemplatePlaceholders(copy["Email Contents"]);
            }
            return copy;
          },
        });

      const fetchStudentData = async (contactId) => {
        const response = await fetch(STUDENT_WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            ContactID: contactId,
          }),
        });

        const responseText = await response.text();
        let parsed;

        try {
          parsed = responseText ? JSON.parse(responseText) : {};
        } catch {
          parsed = { message: responseText || "No response body." };
        }

        if (!response.ok) {
          throw new Error(`HTTP ${response.status} ${response.statusText}`);
        }

        return parsed;
      };

      studentFormEl.addEventListener("submit", async (event) => {
        event.preventDefault();

        const contactId = contactIdInputEl.value.trim();
        if (!contactId) {
          setStatus(studentStatusEl, "Please enter a Contact ID.", "error");
          return;
        }

        submitBtnEl.disabled = true;
        setStatus(studentStatusEl, '<span class="spinner"></span>Loading student details…', "");

        try {
          const studentPayload = await fetchStudentData(contactId);
          currentStudentName = getStudentNameFromPayload(studentPayload);
          currentStudentContactId = contactId;

          if (currentStudentName) {
            setStatus(studentStatusEl, `Student loaded: ${escapeHtml(currentStudentName)}`, "success");
          } else {
            setStatus(studentStatusEl, "Student loaded but no name fields were found. Using [Name] placeholder.", "error");
          }
          updateUpdateEmailButtonState();
        } catch (error) {
          console.error("Student webhook error:", error);
          setStatus(studentStatusEl, `Unable to load student details: ${escapeHtml(error.message)}`, "error");
        } finally {
          submitBtnEl.disabled = false;
        }
      });

      updateEmailBtnEl.addEventListener("click", async () => {
        if (!currentStudentName) {
          setStatus(studentStatusEl, "Load student details first.", "error");
          return;
        }

        if (!currentQualificationTitle) {
          setStatus(studentStatusEl, "Select a qualification first.", "error");
          return;
        }

        await loadEmailTemplates();
        setStatus(
          studentStatusEl,
          `Email templates updated for ${escapeHtml(currentStudentName)} and ${escapeHtml(currentQualificationTitle)}.`,
          "success"
        );
      });

      reloadQualBtn.addEventListener("click", loadQualifications);
      reloadTplBtn.addEventListener("click", loadEmailTemplates);

      assessorPanelEl.addEventListener("change", (event) => {
        if (event.target.name !== "assessorAssignment") {
          return;
        }

        const noAssessorAssigned = getAssessorAssignmentMode() === "none";
        assessorSelectEl.disabled = noAssessorAssigned;
        if (noAssessorAssigned) {
          assessorSelectEl.value = "";
          assessorDetailEl.style.display = "none";
          assessorDetailEl.innerHTML = "";
          currentAssessorName = "No Assessor Assigned";
        } else {
          currentAssessorName = "";
        }

        updateUpdateEmailButtonState();
      });

      assessorSelectEl.addEventListener("change", () => {
        const selected = assessorsData.find((assessor) => String(assessor.ID) === assessorSelectEl.value);
        if (!selected) {
          assessorDetailEl.style.display = "none";
          assessorDetailEl.innerHTML = "";
          return;
        }

        assessorDetailEl.innerHTML = [
          `<div class="studentRow"><div class="studentLabel">ID</div><div class="studentValue">${escapeHtml(String(selected.ID || "-"))}</div></div>`,
          `<div class="studentRow"><div class="studentLabel">First Name</div><div class="studentValue">${escapeHtml(selected["First Name"] || "-")}</div></div>`,
          `<div class="studentRow"><div class="studentLabel">Last Name</div><div class="studentValue">${escapeHtml(selected["Last Name"] || "-")}</div></div>`,
          `<div class="studentRow"><div class="studentLabel">Email</div><div class="studentValue">${escapeHtml(selected.Email || "-")}</div></div>`,
          `<div class="studentRow"><div class="studentLabel">Phone</div><div class="studentValue">${escapeHtml(selected.Phone || "-")}</div></div>`,
        ].join("");
        assessorDetailEl.style.display = "block";
      });

      assessorConfirmBtnEl.addEventListener("click", () => {
        const noAssessorAssigned = getAssessorAssignmentMode() === "none";
        if (!noAssessorAssigned && !assessorSelectEl.value) {
          setStatus(studentStatusEl, "Please select an assessor, or choose No Assessor Assigned.", "error");
          return;
        }

        if (noAssessorAssigned) {
          currentAssessorName = "No Assessor Assigned";
        } else {
          const selected = assessorsData.find((assessor) => String(assessor.ID) === assessorSelectEl.value);
          const firstName = selected?.["First Name"] || "";
          const lastName = selected?.["Last Name"] || "";
          currentAssessorName = `${firstName} ${lastName}`.trim();
        }

        updateUpdateEmailButtonState();
        setStatus(studentStatusEl, `Assessor confirmed: ${escapeHtml(currentAssessorName)}`, "success");
      });

      assessmentDateEl.addEventListener("change", updateUpdateEmailButtonState);
      assessmentTimeEl.addEventListener("change", updateUpdateEmailButtonState);

      // Load both on page load
      loadAssessors();
      loadQualifications();
      loadEmailTemplates();
    </script>
  </body>
</html>
