    <script>
      const SOURCE_HTML_URL = "./AAMC%20RPL%202026.html";
      const QUESTIONS_API_URL = "https://default63871d3cd05d49fa86b6420054699f.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/4e73e4946e2f4d68a1c327ffd94ab86e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=PL4kQafihKKASyjQ6277VCbFKpq76tRgecIcNrKuBps";
      const INDUSTRY_API_URL = "https://default63871d3cd05d49fa86b6420054699f.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/cdaf89af8b5349478d4801c5d3bc1587/triggers/manual/paths/invoke?api-version=1";

      const loadingMessageEl = document.getElementById("loadingMessage");

      const setLoadingMessage = (message) => {
        if (loadingMessageEl) {
          loadingMessageEl.textContent = message;
        }
      };

      const replaceOrThrow = (value, pattern, replacement, label) => {
        const updated = value.replace(pattern, replacement);
        if (updated === value) {
          throw new Error("Unable to patch " + label + ".");
        }
        return updated;
      };

      const MATRIX_STYLE_BLOCK = `
      .welcomeTools {
        margin-top: 10px;
        display: grid;
        gap: 14px;
        justify-items: center;
      }
      .welcomeTools .ctSelectors {
        margin-top: 0;
        width: min(1000px, 100%);
        grid-template-columns: repeat(3, minmax(160px, 1fr)) auto;

      .ctSelectors {

        .welcomeTools .ctSelectors {
          grid-template-columns: 1fr;
        }
        .ctFilterCell {
          padding-top: 0;
        }
      }`;

      const WELCOME_TOOLS_MARKUP = `
          <div class="welcomeTools">
            <div class="frontResetRow">
              <button id="frontResetBtn" type="button" class="secondary">RESET</button>
            </div>
            <div class="ctSelectors">
              <div class="ctSelectorCell">
                <label for="ct1">CT1</label>
                <select id="ct1">
                  <option value="">Select CT1</option>
                  <option>FNSCMP501</option>
                  <option>FNSFMK515</option>
                  <option>FNSINC411</option>
                  <option>FNSINC514</option>

              </div>
              <div class="ctSelectorCell">
                <label for="ct2">CT2</label>
                <select id="ct2">
                  <option value="">Select CT2</option>
                  <option>FNSCMP501</option>
                  <option>FNSFMK515</option>
                  <option>FNSINC411</option>
                  <option>FNSINC514</option>
                </select>
              </div>
              <div class="ctSelectorCell">
                <label for="ct3">CT3</label>
                <select id="ct3">
                  <option value="">Select CT3</option>
                  <option>FNSCMP501</option>
                  <option>FNSFMK515</option>
                  <option>FNSINC411</option>
                  <option>FNSINC514</option>
                </select>
              </div>
              <div class="ctFilterCell">
                <button id="questionFilterBtn" type="button" class="secondary">Question Filter</button>
              </div>
            </div>
            <div style="font-size:15px; font-weight:700; margin-top:4px; text-align:left; width:100%; max-width:1240px;">All Questions</div>
            <div class="questionsPreviewWrap" id="questionsPreviewWrap">
              <div class="questionsPreviewEmpty" id="questionsPreviewEmpty">Questions preview will appear here after loading.</div>
              <table class="questionsPreviewTable hidden" id="questionsPreviewTable">
                <thead>
                  <tr>
                    <th>Question Number</th>
                    <th>Section</th>
                    <th>Question Details</th>
                    <th>Hints</th>
                    <th>Objective</th>
                    <th>CT</th>
                    <th>CT Do Not Ask 1</th>

                <tbody id="questionsPreviewBody"></tbody>

            </div>
            <div id="filteredQuestionsSection" class="hidden" style="width:100%; max-width:1240px; text-align:left;">
              <div style="font-size:15px; font-weight:700; margin-top:16px;">Questions To Be Asked</div>
              <div class="questionsPreviewWrap" id="filteredQuestionsWrap">
                <div class="questionsPreviewEmpty" id="filteredQuestionsEmpty">Apply filter to see questions.</div>
                <table class="questionsPreviewTable hidden" id="filteredQuestionsTable">
                  <thead>
                    <tr>
                      <th>Question Number</th>
                      <th>Section</th>
                      <th>Question Details</th>
                      <th>Hints</th>
                      <th>Objective</th>
                      <th>CT</th>
                      <th>CT Do Not Ask 1</th>
                      <th>CT Override Question</th>
                    </tr>
                  </thead>
                  <tbody id="filteredQuestionsBody"></tbody>
                </table>

            </div>
          </div>`;

      const CONSTANTS_REPLACEMENT = `      const QUESTIONS_API_URL =\n        "${QUESTIONS_API_URL}";\n      const INDUSTRY_API_URL =\n        "${INDUSTRY_API_URL}";\n      const INDUSTRY_PROXY_URL = "/api/industries";\n      const PROMPTS_URL = "/prompts.json";`;

      const ELEMENT_INSERTION = `      const ct1El = document.getElementById("ct1");\n      const ct2El = document.getElementById("ct2");\n      const ct3El = document.getElementById("ct3");\n      const frontResetBtn = document.getElementById("frontResetBtn");\n      const questionsPreviewEmptyEl = document.getElementById("questionsPreviewEmpty");\n      const questionsPreviewTableEl = document.getElementById("questionsPreviewTable");\n      const questionsPreviewBodyEl = document.getElementById("questionsPreviewBody");\n      const questionFilterBtn = document.getElementById("questionFilterBtn");\n      const filteredQuestionsBodyEl = document.getElementById("filteredQuestionsBody");\n      const filteredQuestionsTableEl = document.getElementById("filteredQuestionsTable");\n      const filteredQuestionsEmptyEl = document.getElementById("filteredQuestionsEmpty");\n      const filteredQuestionsSectionEl = document.getElementById("filteredQuestionsSection");`;

      const STATE_INSERTION = `      let welcomePreloadPromise = null;\n      let industriesLoaded = false;\n      let questionsLoaded = false;\n      let filteredQuestions = null;`;

      const HELPER_REPLACEMENT = `      const safeJsonParse = (value) => {\n        if (typeof value !== "string") return value;\n        try {\n          return JSON.parse(value);\n        } catch {\n          return value;\n        }\n      };\n\n      const extractItemsFromResponse = (payload) => {\n        if (Array.isArray(payload)) return payload;\n        const json = safeJsonParse(payload);\n        if (Array.isArray(json)) return json;\n\n        const listItemsSource = json?.listitems;\n        if (typeof listItemsSource === "string") {\n          const parsedListItems = safeJsonParse(listItemsSource);\n          if (Array.isArray(parsedListItems)) return parsedListItems;\n        } else if (Array.isArray(listItemsSource)) {\n          return listItemsSource;\n        }\n\n        const bodyListItemsSource = json?.body?.listitems;\n        if (typeof bodyListItemsSource === "string") {\n          const parsedBodyListItems = safeJsonParse(bodyListItemsSource);\n          if (Array.isArray(parsedBodyListItems)) return parsedBodyListItems;\n        } else if (Array.isArray(bodyListItemsSource)) {\n          return bodyListItemsSource;\n        }\n\n        const bodyValue = json?.body?.value;\n        if (Array.isArray(bodyValue)) return bodyValue;\n\n        const rootValue = json?.value;\n        if (Array.isArray(rootValue)) return rootValue;\n\n        return [];\n      };\n\n      const getIndustryDisplayValue = (item) => {\n        if (item === undefined || item === null) return "";\n        if (typeof item === "string") return item.trim();\n        const text = pickFirstValue(\n          item.Value,\n          item.value,\n          item.title,\n          item.Title,\n          item.name,\n          item.Name,\n          item.label,\n          item.text\n        );\n        if (text) return text;\n        return String(item).trim();\n      };\n\n      const normalizeMultiValueField = (value) => {\n        if (Array.isArray(value)) {\n          return value.map((item) => normalizeMultiValueField(item)).filter(Boolean).join(", ");\n        }\n        if (value && typeof value === "object") {\n          return pickFirstValue(value.Value, value.value, value.Title, value.title, value.Name, value.name, value.text, value.label);\n        }\n        return value === null || value === undefined ? "" : String(value).trim();\n      };\n\n      const getQuestionText = (question) => question?.field_2 || question?.field_5 || question?.Title || "";\n      const getQuestionCt = (question) => question?.field_5 || "";\n      const getQuestionCtDoNotAsk = (question) => normalizeMultiValueField(question?.CTCriteria1);\n      const getQuestionCtOverride = (question) => normalizeMultiValueField(question?.CTOverrideQuestion);\n\n      const loadIndustryOptions = async () => {\n        if (!industryEl) return [];\n        if (industriesLoaded) {\n          return Array.from(industryEl.options).map((option) => option.value).filter(Boolean);\n        }\n        logWelcomeDebug("Industry API", "Loading industries on welcome screen");\n        const selectedValue = industryEl.value || industry || "";\n        industryEl.disabled = true;\n        industryEl.innerHTML = "<option value=\"\">Loading industries...</option>";\n        try {\n          const response = await fetch(INDUSTRY_PROXY_URL, {\n            method: "POST",\n            headers: { "Content-Type": "application/json" },\n            body: JSON.stringify({ upstreamUrl: INDUSTRY_API_URL }),\n          });\n          const payload = await response.json().catch(() => ({}));\n          const text = payload?.rawText || "";\n          const upstreamStatus = payload?.upstreamStatus ?? response.status;\n          const source = payload?.source || "unknown";\n          logWelcomeDebug("Industry API", "HTTP " + upstreamStatus + " via " + source);\n          const parsedPayload = safeJsonParse(text) || payload || {};\n          const items = extractItemsFromResponse(parsedPayload);\n          const labels = Array.from(new Set(items.map(getIndustryDisplayValue).filter(Boolean)));\n          industryEl.innerHTML = "<option value=\"\">Select industry</option>";\n          labels.forEach((label) => {\n            const option = document.createElement("option");\n            option.value = label;\n            option.textContent = label;\n            industryEl.appendChild(option);\n          });\n          if (!labels.length) {\n            industryEl.innerHTML = "<option value=\"\">No industries returned</option>";\n          } else if (selectedValue) {\n            if (!labels.includes(selectedValue)) {\n              const option = document.createElement("option");\n              option.value = selectedValue;\n              option.textContent = selectedValue;\n              industryEl.appendChild(option);\n            }\n            industryEl.value = selectedValue;\n          }\n          industriesLoaded = labels.length > 0;\n          logWelcomeDebug("Industry API", "Loaded " + labels.length + " industries");\n          return labels;\n        } catch (error) {\n          industryEl.innerHTML = "<option value=\"\">Unable to load industries</option>";\n          logDebugDetail("Industry load error", error?.message || String(error));\n          logWelcomeDebug("Industry API error", error?.message || String(error));\n          return [];\n        } finally {\n          industryEl.disabled = false;\n        }\n      };\n\n      const loadQuestionsPreview = async () => {\n        if (questionsLoaded && Array.isArray(questions) && questions.length) {\n          renderQuestionsPreview(questions);\n          return questions;\n        }\n        if (questionsPreviewEmptyEl) {\n          questionsPreviewEmptyEl.textContent = "Loading questions preview...";\n          questionsPreviewEmptyEl.classList.remove("hidden");\n        }\n        if (questionsPreviewTableEl) questionsPreviewTableEl.classList.add("hidden");\n        logWelcomeDebug("Questions API", "Loading questions preview on welcome screen");\n        try {\n          const response = await fetch(QUESTIONS_API_URL, {\n            method: "POST",\n            headers: { "Content-Type": "application/json" },\n          });\n          const text = await response.text();\n          logWelcomeDebug("Questions API", "HTTP " + response.status + " " + response.statusText);\n          const payload = safeJsonParse(text) || {};\n          const items = extractItemsFromResponse(payload);\n          questions = Array.isArray(items) ? items : [];\n          questionsLoaded = questions.length > 0;\n          renderQuestionsPreview(questions);\n          logWelcomeDebug("Questions API", "Loaded " + questions.length + " questions");\n          return questions;\n        } catch (error) {\n          logDebugDetail("Questions preview error", error?.message || String(error));\n          renderQuestionsPreview([]);\n          logWelcomeDebug("Questions API error", error?.message || String(error));\n          return [];\n        }\n      };\n\n      const preloadWelcomeData = async () => {\n        if (welcomePreloadPromise) return welcomePreloadPromise;\n        logWelcomeDebug("Welcome preload", "Starting industry and question preload");\n        welcomePreloadPromise = Promise.all([\n          loadIndustryOptions(),\n          loadQuestionsPreview(),\n        ]).finally(() => {\n          logWelcomeDebug("Welcome preload", "Completed industry/question preload");\n        });\n        return welcomePreloadPromise;\n      };\n\n      const parseListItems = (json) => {\n        const items = extractItemsFromResponse(json);\n        return { items, error: items.length ? null : "No questions returned." };\n      };`;

      const QUESTION_BLOCK_REPLACEMENT = `      const buildQuestionsTableHtml = (questionList) => {\n        if (!Array.isArray(questionList) || !questionList.length) {\n          return "<p>No questions available.</p>";\n        }\n\n        const escapeHtml = (value) => String(value)\n          .replace(/&/g, "&amp;")\n          .replace(/</g, "&lt;")\n          .replace(/>/g, "&gt;")\n          .replace(/\\\"/g, "&quot;")\n          .replace(/'/g, "&#39;");\n\n        const bodyRows = questionList\n          .map((question) => {\n            const row = [\n              question?.Title || "",\n              question?.field_1 || "",\n              getQuestionText(question),\n              question?.field_3 || "",\n              question?.field_4 || "",\n              getQuestionCt(question),\n              getQuestionCtDoNotAsk(question),\n              getQuestionCtOverride(question),\n            ];\n            return "<tr>" + row.map((cell) => "<td>" + escapeHtml(cell || "") + "</td>").join("") + "</tr>";\n          })\n          .join("");\n\n        return [\n          '<div style="font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif; color:#0f172a;">',\n          '  <h2 style="margin:0 0 12px; font-size:18px;">Question Table</h2>',\n          '  <div style="overflow:auto; border:1px solid #e2e8f0; border-radius:10px;">',\n          '    <table style="border-collapse:collapse; width:100%; min-width:900px;">',\n          '      <thead>',\n          '        <tr style="background:#f8fafc; text-align:left;">',\n          '          <th>Question Number</th>',\n          '          <th>Section</th>',\n          '          <th>Question Details</th>',\n          '          <th>Hints</th>',\n          '          <th>Objective</th>',\n          '          <th>CT</th>',\n          '          <th>CT Do Not Ask 1</th>',\n          '          <th>CT Override Question</th>',\n          '        </tr>',\n          '      </thead>',\n          '      <tbody>',\n          bodyRows,\n          '      </tbody>',\n          '    </table>',\n          '  </div>',\n          '  <style>',\n          '    th, td { border: 1px solid #cbd5f5; padding: 8px 10px; vertical-align: top; }',\n          '    th { font-weight: 700; font-size: 13px; }',\n          '    td { font-size: 12px; }',\n          '    tbody tr:nth-child(even) { background: #f9fbff; }',\n          '  </style>',\n          '</div>',\n        ].join("\\n");\n      };\n\n      const renderQuestionsPreview = (questionList) => {\n        if (!questionsPreviewBodyEl || !questionsPreviewTableEl || !questionsPreviewEmptyEl) return;\n        questionsPreviewBodyEl.innerHTML = "";\n        if (!Array.isArray(questionList) || !questionList.length) {\n          questionsPreviewTableEl.classList.add("hidden");\n          questionsPreviewEmptyEl.textContent = "No questions available from the API.";\n          questionsPreviewEmptyEl.classList.remove("hidden");\n          return;\n        }\n\n        questionList.forEach((question) => {\n          const tr = document.createElement("tr");\n          const values = [\n            question?.Title || "",\n            question?.field_1 || "",\n            getQuestionText(question),\n            question?.field_3 || "",\n            question?.field_4 || "",\n            getQuestionCt(question),\n            getQuestionCtDoNotAsk(question),\n            getQuestionCtOverride(question),\n          ];\n          values.forEach((value) => {\n            const td = document.createElement("td");\n            td.textContent = value || "";\n            tr.appendChild(td);\n          });\n          questionsPreviewBodyEl.appendChild(tr);\n        });\n        questionsPreviewEmptyEl.classList.add("hidden");\n        questionsPreviewTableEl.classList.remove("hidden");\n      };\n\n      const renderFilteredQuestions = (questionList) => {\n        if (!filteredQuestionsBodyEl || !filteredQuestionsTableEl || !filteredQuestionsEmptyEl) return;\n        filteredQuestionsBodyEl.innerHTML = "";\n        if (!Array.isArray(questionList) || !questionList.length) {\n          filteredQuestionsTableEl.classList.add("hidden");\n          filteredQuestionsEmptyEl.textContent = questionList !== null\n            ? "No questions match the selected CT criteria."\n            : "No questions available.";\n          filteredQuestionsEmptyEl.classList.remove("hidden");\n          return;\n        }\n        questionList.forEach((question) => {\n          const tr = document.createElement("tr");\n          const values = [\n            question?.Title || "",\n            question?.field_1 || "",\n            getQuestionText(question),\n            question?.field_3 || "",\n            question?.field_4 || "",\n            getQuestionCt(question),\n            getQuestionCtDoNotAsk(question),\n            getQuestionCtOverride(question),\n          ];\n          values.forEach((value) => {\n            const td = document.createElement("td");\n            td.textContent = value || "";\n            tr.appendChild(td);\n          });\n          filteredQuestionsBodyEl.appendChild(tr);\n        });\n        filteredQuestionsEmptyEl.classList.add("hidden");\n        filteredQuestionsTableEl.classList.remove("hidden");\n      };\n\n      const applyQuestionFilter = () => {\n        if (!Array.isArray(questions) || !questions.length) {\n          if (filteredQuestionsEmptyEl) filteredQuestionsEmptyEl.textContent = "No questions loaded yet. Please wait for questions to load.";\n          if (filteredQuestionsSectionEl) filteredQuestionsSectionEl.classList.remove("hidden");\n          return;\n        }\n        const selectedCTs = new Set(\n          [ct1El?.value, ct2El?.value, ct3El?.value]\n            .filter((value) => value && value.trim())\n            .map((value) => value.trim().toUpperCase())\n        );\n        filteredQuestions = questions.filter((question) => {\n          const ctDoNotAskRaw = getQuestionCtDoNotAsk(question);\n          if (!ctDoNotAskRaw || !ctDoNotAskRaw.trim()) return true;\n          const doNotAskItems = ctDoNotAskRaw\n            .split(",")\n            .map((item) => item.trim().toUpperCase())\n            .filter(Boolean);\n          if (!doNotAskItems.length) return true;\n          return !doNotAskItems.every((item) => selectedCTs.has(item));\n        });\n        renderFilteredQuestions(filteredQuestions);\n        if (filteredQuestionsSectionEl) filteredQuestionsSectionEl.classList.remove("hidden");\n      };\n\n      const renderQuestion = () => {\n        const question = questions[currentIndex] || {};\n        const total = questions.length;\n        const number = currentIndex + 1;\n        headerTitleEl.textContent = "Compliance - Question " + number + " of " + total + " - Attempt 1";\n        questionTextEl.textContent = getQuestionText(question);\n        answerInputEl.value = "";\n        lastResponseRecording = null;\n        lastPlaybackRecording = null;\n        stopPlayback({ reset: true });\n        if (playbackBtn) playbackBtn.disabled = true;\n        if (playbackWidgetEl) playbackWidgetEl.classList.add("disabled");\n        if (lastPlaybackUrl) {\n          URL.revokeObjectURL(lastPlaybackUrl);\n          lastPlaybackUrl = "";\n        }\n        lastPlaybackDuration = 0;\n        updatePlaybackUi(0, 0);\n        currentAttempts = 0;\n        currentResponses = [];\n        evaluateBtn.disabled = true;\n        nextBtn.disabled = true;\n        chatHistoryEl.textContent = "";\n        setAttemptLockState(false);\n        if (showHintBtn) showHintBtn.disabled = false;\n        updateEvaluateButtonState();\n      };\n\n      const buildPrompt = (question, answers) => {\n        const questionText = getQuestionText(question);\n        const objective = question.field_3 || "";\n        const hintText = getQuestionHint(question);\n        const answerBlock = answers\n          .map((answerText, index) => "Attempt " + (index + 1) + ":\\n" + answerText)\n          .join("\\n");\n        const ctx = getStudentContext();\n        const template = promptTemplates?.assessmentPrompt;\n        if (template) {\n          return applyTemplate(template, {\n            fullName,\n            firstName,\n            givenName: ctx.givenName || firstName,\n            questionText,\n            objective,\n            hintText,\n            answerBlock,\n            industry,\n            jobTitle,\n          });\n        }\n        return "You are an expert in the Australian Financial industry and are acting as an assessor of " + fullName + "'s responses to the question '" + questionText + "'. " + firstName + " has provided multiple attempts. Use all attempts together to judge completeness without requiring repetition.\\n\\n" + answerBlock + "\\n\\nTake into account " + fullName + " works in the " + industry + " Industry as a " + jobTitle + " and assess using the objective '" + objective + "' if they have demonstrated the required understanding, even if key terms, concepts, or regulations are implied rather than explicitly stated.\\n\\nProvide a concise overview to " + firstName + " that follows these rules:\\n\\n1) If the responses together effectively answer the question and meet the intent of the Objective, do not ask for any further details. Acknowledge that the response is sufficient and tell them to move to the next question.\\n\\n2) If the responses together have not effectively answered the question or do not meet the Objective, do not give the answer. Only ask for the missing information that has not been covered yet. Advise " + firstName + " to add more details by pressing the 'Start' button or typing in the Chat box below. Tell them that if they cannot add any more they can move to the next question.\\n\\n3) Do not say 'Hi' at the start of the response.";\n      };`;

      const BEGIN_ASSESSMENT_FLOW_REPLACEMENT = `      const beginAssessmentFlow = async ({ skipValidation = false, skipCollect = false } = {}) => {\n        const ctx = getStudentContext();\n        fullName = fullNameEl ? fullNameEl.value.trim() : "";\n        if (!fullName) {\n          fullName = ctx.fullName || DEFAULT_FULL_NAME;\n        }\n\n        const industryValue = industryEl?.value?.trim() || industry || "";\n        const jobValue = jobTitleEl?.value?.trim() || jobTitle || "";\n        if (!skipValidation && (!industryValue || !jobValue)) {\n          setStatus("Please complete all fields.");\n          return;\n        }\n\n        if (lastPhotoDataUrl) {\n          const payload = {\n            FullName: fullName,\n            ContactID: String(ctx.contactId),\n            PhotoDataUrl: lastPhotoDataUrl,\n          };\n          try {\n            await fetch("https://default63871d3cd05d49fa86b6420054699f.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/e57e9d0a52bfef11b8e8000d3ae1e1c7/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=yvwUO4qY9Hg1jV31v7Twvpw9AXqQv9sS8V8tP3PHblM", {\n              method: "POST",\n              headers: { "Content-Type": "application/json" },\n              body: JSON.stringify(payload),\n            });\n          } catch (error) {\n            setStatus(error?.message || String(error));\n          }\n        }\n\n        industry = industryValue;\n        jobTitle = jobValue;\n        if (industryEl && industryValue) industryEl.value = industryValue;\n        if (jobTitleEl && jobValue) jobTitleEl.value = jobValue;\n\n        firstName = ctx.givenName || fullName.split(" ").filter(Boolean)[0] || fullName;\n        assessmentStartAt = new Date();\n        setStatus("Loading questions...");\n        beginBtn.disabled = true;\n        if (postWelcomeTitleEl) {\n          postWelcomeTitleEl.textContent = "Assessment Page";\n        }\n\n        if (!skipCollect) {\n          const payload = {\n            FullName: fullName,\n            ContactID: String(ctx.contactId),\n            Industry: industryValue,\n            JobTitle: jobValue,\n          };\n          try {\n            await fetch("https://default63871d3cd05d49fa86b6420054699f.b4.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/942fc95617c0ef11b8e8000d3ae1e1c7/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=R0IuslP0y_9RCNfMG5T-T6f2OiD8JTyZApMQkS8NHjY", {\n              method: "POST",\n              headers: { "Content-Type": "application/json" },\n              body: JSON.stringify(payload),\n            });\n          } catch (error) {\n            setStatus(error?.message || String(error));\n          }\n        }\n\n        try {\n          if (!Array.isArray(questions) || !questions.length) {\n            const response = await fetch(QUESTIONS_API_URL, {\n              method: "POST",\n              headers: { "Content-Type": "application/json" },\n            });\n            const text = await response.text();\n            const payload = safeJsonParse(text) || {};\n            const items = extractItemsFromResponse(payload);\n            if (!items.length) {\n              throw new Error("No questions returned.");\n            }\n            questions = items;\n            questionsLoaded = questions.length > 0;\n          }\n          if (Array.isArray(filteredQuestions)) {\n            questions = filteredQuestions;\n          }\n          renderQuestionsPreview(questions);\n          if (tableBtn) tableBtn.disabled = false;\n          setupCard.classList.add("hidden");\n          quizCard.classList.remove("hidden");\n\n          if (resumeTranscriptText) {\n            applyTranscriptResume(resumeTranscriptText);\n          }\n          if (resumeCurrentQuestionNumber && Number.isFinite(resumeCurrentQuestionNumber)) {\n            const targetIndex = Math.max(0, resumeCurrentQuestionNumber - 1);\n            currentIndex = Math.min(targetIndex, Math.max(0, questions.length - 1));\n          } else if (!skipValidation) {\n            await updateCurrentQuestionFromWebhook();\n          }\n\n          if (currentIndex >= questions.length) {\n            setCompletedState();\n          } else {\n            renderQuestion();\n            setStatus("Ready.");\n            if (progressRowEl) progressRowEl.classList.add("hidden");\n          }\n        } catch (err) {\n          setStatus(err?.message || String(err));\n          beginBtn.disabled = false;\n        }\n      };\n\n      beginBtn.addEventListener("click", async () => {`;

      const buildPatchedHtml = (html) => {
        let patched = html;

        patched = replaceOrThrow(
          patched,
          /<title>AAMC RPL Quiz - V1\.0<\/title>/,
          "<title>AAMC RPL Quiz - V3</title>",
          "document title"
        );

        patched = replaceOrThrow(
          patched,
          /    <\/style>/,
          MATRIX_STYLE_BLOCK + "\n    </style>",
          "matrix styles"
        );

        patched = replaceOrThrow(
          patched,
          /          <button id="welcomeContinueBtn" disabled>Continue<\/button>/,
          WELCOME_TOOLS_MARKUP + "\n          <button id=\"welcomeContinueBtn\" disabled>Continue</button>",
          "welcome matrix markup"

        patched = replaceOrThrow(
          patched,
          /                <select id="industry">[\s\S]*?                <\/select>/,
          '                <select id="industry">\n                  <option value="">Loading industries...</option>\n                </select>',
          "industry select placeholder"
        );

        patched = replaceOrThrow(
          patched,
          /      const questionsUrl =\s*[\r\n]+\s*"[^"]+";\s*[\r\n]+\s*const PROMPTS_URL = "\/prompts\.json";/,
          CONSTANTS_REPLACEMENT,
          "question and industry constants"
        );

        patched = replaceOrThrow(
          patched,
          /      const photoPlaceholderEl = document\.getElementById\("photoPlaceholder"\);/,
          '      const photoPlaceholderEl = document.getElementById("photoPlaceholder");\n' + ELEMENT_INSERTION,
          "matrix DOM bindings"
        );

        patched = replaceOrThrow(
          patched,
          /      let welcomeMode = "new";[\r\n]+      let welcomeDebugInstalled = false;/,
          '      let welcomeMode = "new";\n      let welcomeDebugInstalled = false;\n' + STATE_INSERTION,
          "matrix state variables"
        );

        patched = replaceOrThrow(
          patched,
          /      const parseListItems = \(json\) => \{[\s\S]*?[\r\n]+      \};/,
          HELPER_REPLACEMENT,
          "matrix helper block"
        );

        patched = replaceOrThrow(
          patched,
          /      const buildQuestionsTableHtml = \(questionList\) => \{[\s\S]*?[\r\n]+      \};[\r\n]+[\r\n]+      const renderQuestion = \(\) => \{[\s\S]*?[\r\n]+      \};[\r\n]+[\r\n]+      const buildPrompt = \(question, answers\) => \{[\s\S]*?[\r\n]+      \};/,
          QUESTION_BLOCK_REPLACEMENT,
          "matrix question functions"
        );

        patched = replaceOrThrow(
          patched,
          /      const beginAssessmentFlow = async \(\{ skipValidation = false, skipCollect = false \} = \{\}\) => \{[\s\S]*?[\r\n]+      \};[\r\n]+[\r\n]+      beginBtn\.addEventListener\("click", async \(\) => \{/,
          BEGIN_ASSESSMENT_FLOW_REPLACEMENT,
          "assessment question loading flow"
        );

        patched = replaceOrThrow(
          patched,
          /      const runWelcomeReset = async \(\) => \{[\s\S]*?[\r\n]+      \};/,
          `      const runWelcomeReset = async () => {\n        if (welcomeResetBtn) welcomeResetBtn.disabled = true;\n        if (frontResetBtn) frontResetBtn.disabled = true;\n        logWelcomeDebug("Reset webhook", "Calling reset webhook...");\n        try {\n          const payload = {\n            FullName: getStudentContext().fullName,\n            ContactID: String(getStudentContext().contactId),\n          };\n          const response = await fetch(RESET_WEBHOOK_URL, {\n            method: "POST",\n            headers: { "Content-Type": "application/json" },\n            body: JSON.stringify(payload),\n          });\n          const text = await response.text();\n          logWelcomeDebug("Reset webhook", response.status + " " + response.statusText);\n          logWelcomeDebug("Reset response", text || "(empty)");\n          if (!response.ok) {\n            throw new Error("Reset failed (" + response.status + ") " + response.statusText);\n          }\n          updateWelcomeMessage("");\n          await loadWelcomeWebhook();\n          await preloadWelcomeData();\n        } catch (err) {\n          logWelcomeDebug("Reset error", err?.message || String(err));\n        } finally {\n          if (welcomeResetBtn) welcomeResetBtn.disabled = false;\n          if (frontResetBtn) frontResetBtn.disabled = false;\n        }\n      };`,
          "shared reset handler"
        );

        patched = replaceOrThrow(
          patched,
          /        await loadPromptTemplates\(\);[\r\n]+        await sendStudentContextOnLoad\(\);/,
          '        await loadPromptTemplates();\n        await loadIndustryOptions();\n        await sendStudentContextOnLoad();',
          "startup industry loading"
        );

        patched = replaceOrThrow(
          patched,
          /      loadWelcomeWebhook\(\);/,
          '      loadWelcomeWebhook();\n      preloadWelcomeData();',
          "welcome preload"
        );

        patched = replaceOrThrow(
          patched,
          /      hintOverlayEl\?\.addEventListener\("click", \(event\) => \{[\s\S]*?      \}\);[\r\n]+[\r\n]+      answerInputEl\.addEventListener\("input", \(\) => \{/,
          '      hintOverlayEl?.addEventListener("click", (event) => {\n        if (event.target === hintOverlayEl) {\n          closeHint();\n        }\n      });\n\n      frontResetBtn?.addEventListener("click", async () => {\n        await runWelcomeReset();\n      });\n\n      questionFilterBtn?.addEventListener("click", () => {\n        applyQuestionFilter();\n      });\n\n      answerInputEl.addEventListener("input", () => {',
          "question filter listener"
        );

        return patched;
      };

      const bootstrap = async () => {
        setLoadingMessage("Loading the base assessment page.");
        const response = await fetch(SOURCE_HTML_URL, { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Unable to load source file: " + response.status + " " + response.statusText);
        }

        const sourceHtml = await response.text();
        setLoadingMessage("Applying V3 question-matrix and industry webhook configuration.");
        const patchedHtml = buildPatchedHtml(sourceHtml);
        const blob = new Blob([patchedHtml], { type: "text/html" });
        const blobUrl = URL.createObjectURL(blob);
        window.location.replace(blobUrl + window.location.search + window.location.hash);
      };

      bootstrap().catch((error) => {
        console.error(error);
        setLoadingMessage(error?.message || String(error));
      });
    </script>
