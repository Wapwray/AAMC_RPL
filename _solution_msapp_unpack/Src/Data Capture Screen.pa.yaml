      - Save Photo:
          Control: Button@0.0.45
          Properties:
            Align: =Align.Center
            Appearance: ='ButtonCanvas.Appearance'.Primary
            BorderRadius: =999
            DisplayMode: =If(varEnableSavePhoto, DisplayMode.Edit, DisplayMode.Disabled)
            Font: =Font.'Segoe UI'
            FontColor: =RGBA(255, 255, 255, 1)
            FontSize: =22
            Height: =70
            OnSelect: |+
              =// Step 1: Convert the image to JSON format including binary data
              Set(ImageJSON, JSON(varPicture, JSONFormat.IncludeBinaryData));

              // Step 2: Remove the prefix "data:image/jpeg;base64," from the base64 string
              Set(Base64Image, Mid(ImageJSON, 24, Len(ImageJSON) - 23));

              // Step 3: Remove any trailing quotes (if they exist)
              Set(CleanBase64Image, Substitute(Base64Image, """", ""));

              UpdateContext({varEnableIndustry: true});

            Text: ="Save Photo"
            Width: =325
            X: =833
            Y: =343
