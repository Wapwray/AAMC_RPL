    Properties:
      Fill: =RGBA(43, 43, 43, 1)
      OnVisible: "=\r\n\r\n\r\n \r\n    Set(AssessmentName, \"RPL\");\r\n    Set(varShowImage, true);\r\n    Set(SelectedIndustry,\" \");\r\n    Set(JobTitleVariable,\"\");\r\n    Set(varPicture,'AAMC Logo');\r\n    Set(varPic2,'PersonIcon_transparent');\r\n    Set(varIconBackground, false);\r\n    Set(varIconImage, true);\r\n    Set(varCameraChoice, 0);\r\n    \r\n    UpdateContext({varEnableSavePhoto: false});\r\n    UpdateContext({varPhotoCover: true});\r\n    UpdateContext({varEnableIndustry: false});\r\n    UpdateContext({varConfirmIndustry: false});\r\n    UpdateContext({varEnableJobTitle: false});\r\n    UpdateContext({varConfirmJobTitle: false});\r\n    UpdateContext({varStartAssessment: false});\r\n"
    Children:
      - Bottom Right - XXX:
          Control: Image@2.2.3
          Properties:
            Height: =203
            Image: ='XXX Bottom Right'
            ImagePosition: =ImagePosition.Stretch
            Width: =286
            X: =1105
            Y: =565
      - txtJobTitle:
          Control: Classic/TextInput@2.3.2
          Properties:
            Default: =""
            DisplayMode: =If(varEnableJobTitle, DisplayMode.Edit, DisplayMode.Disabled)
            Height: =42
            HintText: ="Type your job title here"
            OnChange: |-
              =// UpdateContext({varConfirmJobTitle: true});
              // Set(JobTitleVariable, 'txtJobTitle'.Text);
            OnSelect: |-
              =UpdateContext({varConfirmJobTitle: true});
            Width: =406
            X: =491
            Y: =589
      - IndustryDropdown:
          Control: Classic/DropDown@2.3.1
          Properties:
            Default: =First(Sort('Industry List - RPL', Industry, SortOrder.Ascending)).Industry
            DisplayMode: =If(varEnableIndustry, DisplayMode.Edit, DisplayMode.Disabled)
            Height: =44
            Items: =Sort('Industry List - RPL', Industry,SortOrder.Ascending)
            Items.Value: =Title
            OnChange: =Set(SelectedIndustry, IndustryDropdown.Selected.Industry);
            OnSelect: |-
              =Set(SelectedIndustry, IndustryDropdown.Selected.Industry);
              UpdateContext({varConfirmIndustry: true});
            Width: =388
            X: =48
            Y: =588
      - Move To Assessment:
          Control: Button@0.0.45
          Properties:
            Appearance: ='ButtonCanvas.Appearance'.Primary
            BorderRadius: =999
            DisplayMode: =If(varStartAssessment, DisplayMode.Edit, DisplayMode.Disabled)
            Font: =Font.'Segoe UI'
            FontColor: =RGBA(255, 255, 255, 1)
            FontSize: =22
            Height: =55
            OnSelect: |+
              =// Save photo and job details
              Set(AssessmentStartDate,Now());
              SaveAssessmentPhoto.Run(CleanBase64Image, User().FullName, AssessmentName, DateStamp, User().Email);
              SaveJobDetails.Run(User().FullName, User().Email, SelectedIndustry, JobTitleVariable);


              Set(TranscriptHeader,
                  "=============================" & Char(10) &
                  "Assessment Transcript" & Char(10) &
                  "=============================" & Char(10) &
                  "Name: " & User().FullName & Char(10) &
                  "Email: " & User().Email & Char(10) &
                  "Assessment: " & AssessmentName & Char(10) &
                  "Date: " & Text(DateStamp, "dd mmm yyyy") & Char(10) &
                  "Initial Start Date: " & Text(AssessmentStartDate, "dd mmm yyyy hh:mm:ss") & Char(10) &  // ← ADDED LINE
                  "Industry: " & SelectedIndustry & Char(10) &
                  "Job Title: " & JobTitleVariable & Char(10) &
                  "=============================" & Char(10) & Char(10)
              );


              // Store it in FullTranscriptBuffer
              Set(FullTranscriptBuffer,
                  { fulltranscript: TranscriptHeader }
              );

              // Send transcript header to flow (optional but ensures file is initialized)
              TranscriptUpdater.Run(
                  User().FullName,
                  User().Email,
                  FullTranscriptBuffer.fulltranscript
              );

              // Set question number to 1
              Set(varQuestionNumber, 1);

              AssessmentStartedYes.Run(
                  User().FullName,
                  User().Email,
                  "Yes - " & Text(Now(), "dd mm yyyy HH:mm:ss")
              );


              // Finally, navigate to the assessment screen
              Navigate('Assessment Screen', ScreenTransition.Cover);
            Text: ="Begin The Assessment"
            Width: =391
            X: =939
            Y: =582
      - Confirm Job Title:
