Screens:
  Assessment Screen:
    Properties:
      OnVisible: |+
        =UpdateContext({varEnableNextQuestion: false});
        Set(varHintVisible, false);
        Set(varChatHistoryHeight, 345);
        Set(showAnswerInstruction, true);  
        Set(enableAnswerBox, true);
        Set(varTimerOn, false);

        Set(varChatWindow,"");

        Set(CurrentQuestionSummary,{ Text: "THIS IS THE QUESTION - FROM THE START" });

        Set(CurrentConversationBuffer, ""); 
        Set(TempCurrentConversationBuffer,"");

        Set(varEditText, true);
        Set(varMicOn,true);
        Set(varAnswerLength, 0);

        Set(Transcribed1,"");
        Set(Attempt1, { Text: "" });
        Set(Transcribed2,"");
        Set(Attempt2, { Text: "" });
        Set(Transcribed3,"");
        Set(Attempt3, { Text: "" });

        Set(CurrentFeedback,"");

        Set(varRecording, false);

        Set(varFirstName,
            If(
                !IsBlank(User().FullName),
                Trim(First(Split(User().FullName, " ")).Value),
                "User"
            )
        );

        // Step 2: Load the questions collection
        ClearCollect(colQuestions, 'RPL Spreadsheet - List Version For Upload');

        // Step 3: Only proceed if questions are available
        If(
            CountRows(colQuestions) > 0,

            // Step 4: Set total number of questions
            Set(TotalQuestions, CountRows(colQuestions));

            // Step 5: Determine which question number to start on
            Set(
                varQuestionNumber,
                If(
                    varResumeMode = true && !IsBlank(varAssessmentQuestion),
                    Value(varAssessmentQuestion),
                    1
                )
            );

            // Step 6: Load the current question and related metadata
            // If(
            //    IsBlank(TranscriptionsText),
            //   Set(TranscriptionsText, "")
            // );

        Set(TranscriptionsText, "");

        Set(EditableText, TranscriptionsText);

        Set(
        PriorAnswers,
               {
                   EditableText: EditableText,
                    TranscriptionsText: TranscriptionsText
                }
         );

            Set(CurrentEvaluation, "");
            Set(CurrentQuestionAttempt, 1);

            Set(
                CurrentQuestionText,
                LookUp(
                    colQuestions,
                    Value('Question Number') = varQuestionNumber,
                    'Question Details'
                )
            );

            Set(
                CurrentHintText,
                LookUp(
                    colQuestions,
                    Value('Question Number') = varQuestionNumber,
                    Hints
                )
            );

            Set(
                CurrentPromptOutline,
                LookUp(
                    colQuestions,
                    Value('Question Number') = varQuestionNumber,
                    'Prompt Outline'
                )
            );

            Set(
                CurrentObjective,
                LookUp(
                    colQuestions,
                    Value('Question Number') = varQuestionNumber,
                    Objective
                )
            );

            Set(varCurrentQuestionStartTime, Now());
            Set(varCurrentQuestionFinishTime, Now());
            Set(varDuration, Now());
            Set(varAttempt1StartTime, Now());

            // Step 7: Set screen-specific UI flags
            UpdateContext({ varEnablePlayback: false });
            UpdateContext({ varEnableEvaluate: false });
        );

        // Step 8: Load transcript from Power Automate
        Set(FullTranscriptBuffer, TranscriptCollectorLive.Run(User().FullName, User().Email));
