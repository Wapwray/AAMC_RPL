      - Button_Evaluate:
          Control: Button@0.0.45
          Properties:
            Appearance: ='ButtonCanvas.Appearance'.Primary
            BorderRadius: =999
            DisplayMode: =If(varEnableEvaluate, DisplayMode.Edit, DisplayMode.Disabled)
            Font: =Font.'Segoe UI'
            FontColor: =RGBA(255, 255, 255, 1)
            FontSize: =22
            Height: =58
            OnSelect: "=UpdateContext({varEnableNextQuestion: false});\r\nUpdateContext({varEnableEvaluate: false});\r\nSet(showAnswerInstruction, false);  \r\nSet(varEnableEvaluate, false);\r\nSet(varMicOn,false);\r\nSet(varEnablePlayback, false);\r\nSet(varEnableNextQuestion, false);\r\n\r\nUpdateContext({varTimerOn: false});\r\n// --------------------------\r\n// Start assessment recording\r\n// --------------------------\r\nSet(CurrentUserEmail, User().Email);\r\nSet(CurrentUserName, User().FullName);\r\n\r\nAssessmentStartedYes.Run(CurrentUserName, CurrentUserEmail, \"Yes\");\r\nSet(TranscriptionsText, EditableText);\r\nSet(CurrentEvaluation, \"EVALUATING - PLEASE WAIT\");\r\n\r\n// --------------------------\r\n// Handle Attempt 1\r\n// --------------------------\r\nIf(CurrentQuestionAttempt = 1,\r\n    Set(Transcribed1, TranscriptionsText);\r\n    Set(Attempt1, 'Assessor Prompt 1'.Predict(\r\n        CurrentUserName,\r\n        JobTitleVariable,\r\n        varFirstName,\r\n        Transcribed1,\r\n        SelectedIndustry,\r\n        CurrentQuestionText,\r\n        CurrentObjective\r\n    ));\r\n    Set(CurrentEvaluation, Attempt1.Text);\r\n    Set(CurrentFeedback, Attempt1.Text);\r\n    Set(varAttempt1FinishTime, Now());\r\n    Set(\r\n        AttemptDuration,\r\n        \"Total Time Taken: \" &\r\n        Text(Int(DateDiff(varAttempt1StartTime, varAttempt1FinishTime, TimeUnit.Minutes) / 60), \"00\") & \":\" &\r\n        Text(Mod(DateDiff(varAttempt1StartTime, varAttempt1FinishTime, TimeUnit.Minutes), 60), \"00\") & \":\" &\r\n        Text(Mod(DateDiff(varAttempt1StartTime, varAttempt1FinishTime, TimeUnit.Seconds), 60), \"00\")\r\n    );\r\n    Set(CurrentChat, 1);\r\n    Set(showAnswerInstruction, true);  \r\nSet(enableAnswerBox, true);\r\nSet(varMicOn,true);\r\n);\r\n\r\n// --------------------------\r\n// Handle Attempt 2\r\n// --------------------------\r\nIf(CurrentQuestionAttempt = 2,\r\n    Set(Transcribed2, TranscriptionsText);\r\n    Set(Attempt2, 'Assessor Prompt 2'.Predict(\r\n        CurrentUserName,\r\n        JobTitleVariable,\r\n        Transcribed2,\r\n        Attempt1.Text,\r\n        varFirstName,\r\n        Transcribed1,\r\n        SelectedIndustry,\r\n        CurrentQuestionText,\r\n        CurrentObjective\r\n    ));\r\n    Set(CurrentEvaluation, Attempt2.Text);\r\n    Set(CurrentFeedback, Attempt2.Text);\r\n    Set(varAttempt2StartTime, varAttempt1FinishTime);\r\n    Set(varAttempt2FinishTime, Now());\r\n    Set(\r\n        AttemptDuration,\r\n        \"Total Time Taken: \" &\r\n        Text(Int(DateDiff(varAttempt2StartTime, varAttempt2FinishTime, TimeUnit.Minutes) / 60), \"00\") & \":\" &\r\n        Text(Mod(DateDiff(varAttempt2StartTime, varAttempt2FinishTime, TimeUnit.Minutes), 60), \"00\") & \":\" &\r\n        Text(Mod(DateDiff(varAttempt2StartTime, varAttempt2FinishTime, TimeUnit.Seconds), 60), \"00\")\r\n    );\r\n    Set(CurrentChat, 2);\r\n    Set(showAnswerInstruction, true);  \r\nSet(enableAnswerBox, true);\r\nSet(varMicOn,true);\r\n);\r\n\r\n// --------------------------\r\n// Handle Attempt 3\r\n// --------------------------\r\nIf(CurrentQuestionAttempt = 3,\r\n\r\nSet(showAnswerInstruction, false);  \r\nSet(enableAnswerBox, false);\r\nSet(varChatHistoryHeight, 497);\r\nSet(varMicOn,false);\r\n\r\n\r\n\r\n\r\n    Set(Transcribed3, TranscriptionsText);\r\n    Set(Attempt3, 'Assessor Prompt 3'.Predict(\r\n        CurrentUserName,\r\n        JobTitleVariable,\r\n        Transcribed2,\r\n        varFirstName,\r\n        Attempt1.Text,\r\n        Transcribed3,\r\n        Attempt2.Text,\r\n        Transcribed1,\r\n        SelectedIndustry,\r\n        CurrentQuestionText,\r\n        CurrentObjective\r\n    ));\r\n    Set(CurrentEvaluation, Attempt3.Text);\r\n    Set(CurrentFeedback, \"Thank you for your final response. Please move to the next question\");\r\n    Set(varAttempt3StartTime, varAttempt2FinishTime);\r\n    Set(varAttempt3FinishTime, Now());\r\n    Set(\r\n        AttemptDuration,\r\n        \"Total Time Taken: \" &\r\n        Text(Int(DateDiff(varAttempt3StartTime, varAttempt3FinishTime, TimeUnit.Minutes) / 60), \"00\") & \":\" &\r\n        Text(Mod(DateDiff(varAttempt3StartTime, varAttempt3FinishTime, TimeUnit.Minutes), 60), \"00\") & \":\" &\r\n        Text(Mod(DateDiff(varAttempt3StartTime, varAttempt3FinishTime, TimeUnit.Seconds), 60), \"00\")\r\n    );\r\n    Set(CurrentChat, 3)\r\n);\r\n\r\nSet(\r\n    CurrentConversationBuffer,\r\n    \r\n    \"-----------------------------\" & Char(10) &\r\n    CurrentQuestionText & Char(10) & Char(10) &\r\n\r\n    If(!IsBlank(Transcribed1),\r\n        varFirstName & \" (Attempt 1):\" & Char(10) &\r\n        Transcribed1 & Char(10) &\r\n        \"AssessorBot:\" & Char(10) &\r\n        Attempt1.Text & Char(10) &\r\n        \"Submitted: \" & Text(varAttempt1FinishTime, \"dd mmm yyyy HH:mm:ss\") & Char(10) & Char(10),\r\n        \"\"\r\n    ) &\r\n\r\n    If(!IsBlank(Transcribed2),\r\n        varFirstName & \" (Attempt 2):\" & Char(10) &\r\n        Transcribed2 & Char(10) &\r\n        \"AssessorBot:\" & Char(10) &\r\n        Attempt2.Text & Char(10) &\r\n        \"Submitted: \" & Text(varAttempt2FinishTime, \"dd mmm yyyy HH:mm:ss\") & Char(10) & Char(10),\r\n        \"\"\r\n    ) &\r\n\r\n    If(!IsBlank(Transcribed3),\r\n        varFirstName & \" (Attempt 3):\" & Char(10) &\r\n        Transcribed3 & Char(10) &\r\n        \"AssessorBot:\" & Char(10) &\r\n        Attempt3.Text & Char(10) &\r\n        \"Submitted: \" & Text(varAttempt3FinishTime, \"dd mmm yyyy HH:mm:ss\") & Char(10) & Char(10),\r\n        \"\"\r\n    ) &\r\n\r\n    \"-----------------------------\" & Char(10)\r\n);\r\n\r\n\r\n// --------------------------\r\n// Prepare metadata\r\n// --------------------------\r\nSet(Q1UserDetails,\r\n    varQuestionNumber & \" - \" & CurrentUserName & \" \" & AssessmentName & \" : \" &\r\n    LookUp(\r\n        'RPL Spreadsheet - List Version For Upload',\r\n        'Question Number' = varQuestionNumber,\r\n        Section\r\n    ) & \" Question \" & varQuestionNumber & \" - Attempt \" & CurrentQuestionAttempt\r\n);\r\n\r\nSet(StorageEmail, CurrentUserEmail);\r\n\r\n// Ensure StringB64Var1 is valid before saving\r\nIf(\r\n    !varRecordingHappened,\r\n    Set(StringB64Var1, \"NoAudioAvailable\")\r\n);\r\n\r\n// Proceed with save only if all required fields are present\r\nIf(\r\n    !IsBlank(CurrentUserEmail) && !IsBlank(TranscriptionsText) && !IsBlank(CurrentEvaluation),\r\n    SaveContentToAssessorStorage.Run(\r\n        Q1UserDetails,\r\n        StorageEmail,\r\n        StringB64Var1,\r\n        CurrentUserName,\r\n        TranscriptionsText,\r\n        CurrentEvaluation\r\n    ),\r\n    Notify(\"Save failed: Email, Transcription, or Evaluation is missing.\", NotificationType.Error)\r\n);\r\n\r\n\r\n// --------------------------\r\n// Progress to next attempt\r\n// --------------------------\r\nIf(CurrentQuestionAttempt < 3,\r\n    Set(CurrentQuestionAttempt, CurrentQuestionAttempt + 1)\r\n);\r\n\r\n\r\n\r\n// --------------------------\r\n// Clear editable field at end\r\n// --------------------------\r\nSet(EditableText, \"\");\r\n\r\n\r\nSet(varRecordingHappened, false);\r\n\r\nSet(\r\n    varChatWindow,\r\n    \r\n    If(\r\n        CurrentChat >= 1,\r\n        varFirstName & \" - \" & Transcribed1 & Char(10) &\r\n        \"AssessorBot - \" & Attempt1.Text & Char(10) & Char(10),\r\n        \"\"\r\n    ) &\r\n\r\n    If(\r\n        CurrentChat >= 2,\r\n        varFirstName & \" - \" & Transcribed2 & Char(10) &\r\n        \"AssessorBot - \" & Attempt2.Text & Char(10) & Char(10),\r\n        \"\"\r\n    ) &\r\n\r\n    If(\r\n        CurrentChat >= 3,\r\n        varFirstName & \" - \" & Transcribed3 & Char(10) &\r\n        \"AssessorBot - \" & Attempt3.Text & Char(10) & Char(10),\r\n        \"\"\r\n    );\r\n);\r\n\r\nUpdateContext({varEnableNextQuestion: true});\r\n\r\n\r\n\r\n\r\n\r\n\r\n"
            Text: ="Evaluate"
            Width: =168
            X: =1162
            Y: =487
      - Button_Transcribe:
          Control: Button@0.0.45
          Properties:
            Appearance: ='ButtonCanvas.Appearance'.Primary
            BorderColor: =ColorValue("#009999")
            BorderRadius: =999
            DisplayMode: =If(varEnablePlayback, DisplayMode.Edit, DisplayMode.Disabled)
            Font: =Font.'Segoe UI'
            FontColor: =RGBA(255, 255, 255, 1)
            FontSize: =22
            Height: =58
            OnSelect: "=Set(showAnswerInstruction, false);  \r\nSet(varEnableEvaluate, false);\r\nSet(varMicOn,false);\r\nSet(varEnablePlayback, false);\r\nSet(varEnableEvaluate, false);\r\nSet(varEnableNextQuestion, false);\r\nUpdateContext({varEnablePlayback: false});\r\n\r\n\r\n\r\nSet(TranscriptionsText,\"TRANSCRIBING - PLEASE WAIT\");\r\nSet(RecordingStatus, \"Recording has content\");\r\n\r\n        Set(NowVar,Now());\r\n        Set(TempRecordingVar,Microphone1.Audio);\r\n        Set(TempJason,JSON(Microphone1.Audio,JSONFormat.IncludeBinaryData));\r\n        Set(StringB64Var1,Mid(TempJason,25,Len(TempJason)-25));\r\n        Set(Q1UserDetails, User().FullName & \" - \" & Now() & \" - \" & User().Email & \" - \" & \"Question 1\");\r\n        Set(flowResonse, 'AzureTextTranscription1.0'.Run(Q1UserDetails,\", \",StringB64Var1));\r\n\r\n\r\n     //   Set(TranscribedQ1, flowResonseQ1.transcribedtextx);\r\n     //   Set(TranscriptionsText,TranscribedQ1);\r\n\r\n       \r\n\r\n\r\n        If (CurrentQuestionAttempt = 1,\r\n\r\n      Set(Transcribed1, flowResonse.transcribedtextx);\r\n      Set(EditableText,Transcribed1);\r\n      Set(TranscriptionsText, EditableText);\r\n\r\n      \r\n\r\n        );\r\n\r\n                \r\n        If (CurrentQuestionAttempt = 2,\r\n\r\n        Set(Transcribed2, flowResonse.transcribedtextx);    \r\n        Set(EditableText, Concatenate(Char(10), Transcribed2));\r\n         Set(TranscriptionsText, EditableText);\r\n\r\n        );\r\n\r\n     If (CurrentQuestionAttempt = 3,\r\n        \r\n        Set(Transcribed3, flowResonse.transcribedtextx);\r\n        Set(EditableText, Concatenate(EditableText, Char(10), Transcribed3));\r\n        Set(TranscriptionsText, EditableText);\r\n\r\n        );\r\n\r\n       \r\n\r\n        Set(varEditText, true);\r\n        Set(varRecordingHappened, true);\r\n\r\n         UpdateContext({varEnableEvaluate: true});\r\nSet(enableAnswerBox, true);\r\n\r\nSet(showAnswerInstruction, true);  \r\nSet(varEnableEvaluate, true);\r\nSet(varMicOn,true);\r\nSet(varEnablePlayback, true);\r\nSet(varEnableEvaluate, true);\r\nSet(varEnableNextQuestion, true);\r\n\r\n        \r\n"
            Text: ="Transcribe"
            Width: =164
            X: =1161
            Y: =371
