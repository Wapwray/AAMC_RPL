      - Button_Next Question:
          Control: Button@0.0.45
          Properties:
            Align: =Align.Justify
            Appearance: ='ButtonCanvas.Appearance'.Primary
            BorderRadius: =999
            DisplayMode: |-
              =If(varEnableNextQuestion, DisplayMode.Edit, DisplayMode.Disabled)
              // If(CurrentQuestionAttempt > 1, DisplayMode.Edit, DisplayMode.Disabled)
            Font: =Font.'Segoe UI'
            FontColor: =RGBA(255, 255, 255, 1)
            FontSize: =22
            Height: =58
            OnSelect: "=// Update FullTranscriptBuffer with new content (but keep the original header untouched)\r\n\r\nSet(CurrentQuestionSummary, 'Assessor Question Summary'.Predict(\r\n    User().FullName,\r\n    JobTitleVariable,\r\n    Transcribed2,\r\n    varFirstName,\r\n    Attempt1.Text,\r\n    Transcribed3,\r\n    Attempt2.Text,\r\n    Transcribed1,\r\n    SelectedIndustry,\r\n    CurrentQuestionText,\r\n    CurrentObjective\r\n));\r\n\r\n\r\nSet(\r\n    FullTranscriptBuffer,\r\n    {\r\n        fulltranscript: \r\n            FullTranscriptBuffer.fulltranscript & // Preserves the original header\r\n            \"Question \" & Text(varQuestionNumber) & \": \" & CurrentQuestionText & Char(10) &\r\n            \"Summary: \" & CurrentQuestionSummary.Text & Char(10) & Char(10) &\r\n            CurrentConversationBuffer\r\n    }\r\n);\r\n\r\n// Send updated full transcript to the flow\r\nIf(\r\n    !IsBlank(User().FullName) && \r\n    !IsBlank(User().Email) && \r\n    !IsBlank(FullTranscriptBuffer.fulltranscript),\r\n\r\n    TranscriptUpdater.Run(\r\n        User().FullName,\r\n        User().Email,\r\n        FullTranscriptBuffer.fulltranscript\r\n    )\r\n);\r\n\r\n\r\nSet(Transcribed1,\"\");\r\nSet(Attempt1, { Text: \"\" });\r\nSet(Transcribed2,\"\");\r\nSet(Attempt2, { Text: \"\" });\r\nSet(Transcribed3,\"\");\r\nSet(Attempt3, { Text: \"\" });\r\nSet(TranscriptionsText,\"\");\r\nSet(EditableText,\"\");\r\n// Increment the question number\r\nSet(varQuestionNumber, varQuestionNumber + 1);\r\n\r\n// Ensure all inputs are valid before calling the flow\r\nIf(\r\n    !IsBlank(Q1UserDetails) && !IsBlank(User().Email) && !IsBlank(User().FullName) && !IsBlank(varQuestionNumber),\r\n    SaveCurrentQuestionNumber.Run(\r\n        Q1UserDetails,\r\n        User().Email,\r\n        User().FullName,\r\n        Text(varQuestionNumber) // Ensure it's passed as text\r\n    )\r\n);\r\n\r\n// Check if we are at the end of the question list\r\nIf(\r\n    varQuestionNumber > TotalQuestions,\r\n    Navigate('Final Screen', ScreenTransition.Fade),\r\n    \r\n    // Otherwise, load the next question\r\n    Set(\r\n        CurrentQuestionText,\r\n        LookUp(\r\n            'RPL Spreadsheet - List Version For Upload',\r\n            'Question Number' = Text(varQuestionNumber),\r\n            'Question Details'\r\n        )\r\n    );\r\n    \r\n    Set(\r\n        CurrentHintText,\r\n        LookUp(\r\n            'RPL Spreadsheet - List Version For Upload',\r\n            'Question Number' = Text(varQuestionNumber),\r\n            Hints\r\n        )\r\n    );\r\n\r\n    Set(TranscriptionsText, \"\");\r\n    Set(EditableText, TranscriptionsText);\r\n    Set(CurrentEvaluation, \"\");\r\n    Set(CurrentQuestionAttempt, 1);\r\n\r\n    Set(\r\n        CurrentPromptOutline,\r\n        LookUp(\r\n            'RPL Spreadsheet - List Version For Upload',\r\n            'Question Number' = Text(varQuestionNumber),\r\n            'Prompt Outline'\r\n        )\r\n    );\r\n\r\n    Set(\r\n        CurrentObjective,\r\n        LookUp(\r\n            'RPL Spreadsheet - List Version For Upload',\r\n            'Question Number' = Text(varQuestionNumber),\r\n            Objective\r\n        )\r\n    );\r\n\r\n    Set(\r\n        varAttempt1StartTime,\r\n        Now()\r\n    )\r\n);\r\n\r\nSet(showAnswerInstruction, true);  \r\nSet(enableAnswerBox, true);\r\nSet(varChatHistoryHeight, 345);\r\nSet(varMicOn,true);\r\nSet(varChatWindow,\"\");\r\n\r\n UpdateContext({varEnableEvaluate: false});\r\nUpdateContext({varEnableEvaluate: false});\r\nSet(CurrentChat,0);\r\n\r\nUpdateContext({varEnableNextQuestion: false});"
            Text: ="Next"
            Width: =164
            X: =1160
            Y: =670
