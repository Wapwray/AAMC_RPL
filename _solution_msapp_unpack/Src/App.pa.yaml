App:
  Properties:
    OnStart: |+
      =
      Set(varButtonColor, ColorValue("#009999"))


      Set(varTestNameCaptured, false);

      Set(varStarted, "false");

      Set(DateStamp, "");
      // Set(varQuestionNumber, 1);

      Set(CurrentPromptDetails,"");
      Set(CurrentQuestionSection,"");
      Set(CurrentHintText, "This Is The Start Hint");
      Set(CurrentObjective,"Hello World");
      Set(CurrentQuestionText,"from App start");
      Set(CurrentQuestionNumber,1;
      Set(CurrentQuestionAttempt,0);
      Set(Q1TrackerQuestionNumber,"1");

      Set(AppStartTime, Text(Now(), "hh:mm:ss tt"));



      Set(TranscribedQ1,"");
      Set(TranscribedQ2,"");
      Set(TranscribedQ3,"");

      Set(Q1Evaluation,"");
      Set(Q2Evaluation,"");
      Set(Q3Evaluation,"");




      Set(CurrentEvaluation,"");

      Set(TranscriptionsText,"");
    Theme: ='AAMC Theme'
